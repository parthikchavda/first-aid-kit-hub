    let currentLang = 'both';

    function setLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      event.currentTarget.classList.add('active');
      renderQuiz();
    }

    function renderQuiz() {
      const container = document.getElementById('quiz');
      container.innerHTML = '';

      mcqs.forEach((mcq, qIndex) => {
        let qHTML = `<div class="question-card">
      <div class="question-number">પ્રશ્ન ${qIndex + 1} | Question ${qIndex + 1}</div>
      <div class="question-text">`;

        if (currentLang === 'both' || currentLang === 'en') qHTML += `${mcq.q}<br>`;
        if (currentLang === 'both' || currentLang === 'gu') qHTML += `<strong>${mcq.guj}</strong>`;

        qHTML += `</div><div class="options" id="options-${qIndex}">`;

        for (let i = 0; i < mcq.optionsEn.length; i++) {
          let displayText = '';
          if (currentLang === 'both') {
            displayText = `${mcq.optionsEn[i]}<br><span style="color:#475569; font-size:0.98rem;">${mcq.optionsGuj[i]}</span>`;
          } else if (currentLang === 'en') {
            displayText = mcq.optionsEn[i];
          } else {
            displayText = mcq.optionsGuj[i];
          }

          qHTML += `
        <div class="option" data-q="${qIndex}" data-opt="${i}" 
             onclick="selectAnswer(${qIndex}, ${i}, this)">
          ${displayText}
        </div>`;
        }

        qHTML += `</div>
      <div class="result" id="result-${qIndex}"></div>
    </div>`;

        container.innerHTML += qHTML;
      });
    }

    function selectAnswer(qIndex, selectedIndex, element) {
      const mcq = mcqs[qIndex];
      const allOptions = document.querySelectorAll(`#options-${qIndex} .option`);
      const resultDiv = document.getElementById(`result-${qIndex}`);

      allOptions.forEach(opt => {
        opt.style.pointerEvents = 'none';
        const idx = parseInt(opt.getAttribute('data-opt'));

        if (idx === mcq.answer) opt.classList.add('correct');
        if (idx === selectedIndex && selectedIndex !== mcq.answer) opt.classList.add('wrong');
      });

      resultDiv.style.display = 'block';
      if (selectedIndex === mcq.answer) {
        resultDiv.className = 'result correct-result';
        resultDiv.innerHTML = '✅ સાચો જવાબ!';
      } else {
        resultDiv.className = 'result wrong-result';
        resultDiv.innerHTML = `❌ ખોટો જવાબ!<br>સાચો જવાબ: ${mcq.optionsGuj[mcq.answer]}`;
      }
    }

    // Initialize Quiz
    renderQuiz();
  </script>

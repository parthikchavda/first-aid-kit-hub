<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetMaster • Computer Networks MCQ</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Noto+Sans+Gujarati:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #3b82f6;
  --success: #10b981;
  --danger: #ef4444;
  --bg: #f0f9ff;
  --card: #ffffff;
  --text: #1e3a8a;
  --border: #bae6fd;
  --shadow: 0 10px 30px rgba(59, 130, 246, 0.12);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Sticky Header */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(135deg, #3b82f6, #1e40af);
  color: white;
  padding: 14px 0;
  box-shadow: var(--shadow);
  z-index: 1000;
  transition: all 0.4s ease;
}
.header.hidden { transform: translateY(-100%); }

.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.brand { font-size: 24px; font-weight: 700; }

.go-to-q {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.2);
  padding: 6px 12px;
  border-radius: 30px;
}
.go-to-q input {
  background: transparent;
  border: none;
  color: white;
  width: 70px;
  font-size: 15px;
  text-align: center;
  outline: none;
}
.go-to-q input::placeholder { color: rgba(255,255,255,0.7); }

.global-lang {
  display: flex;
  background: rgba(255,255,255,0.2);
  border-radius: 30px;
  padding: 4px;
}
.global-lang button {
  padding: 8px 18px;
  border: none;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: white;
}
.global-lang button.active {
  background: white;
  color: #3b82f6;
}

/* Rest of the page */
.container { max-width: 1100px; margin: 100px auto 40px; padding: 0 20px; }

.hero {
  text-align: center;
  padding: 40px 20px;
  background: white;
  border-radius: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 30px;
}
.hero-title { font-size: 2.8rem; font-weight: 700; color: #1e40af; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 15px;
  justify-content: center;
  margin-bottom: 30px;
}
.search-box {
  flex: 1;
  max-width: 380px;
  padding: 14px 20px;
  border: 2px solid #bae6fd;
  border-radius: 50px;
  font-size: 16px;
  background: white;
}

.mcq-card {
  background: white;
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 25px;
  box-shadow: var(--shadow);
  transition: all 0.3s;
}
.mcq-card:hover { transform: translateY(-6px); }

.question-num { color: var(--primary); font-weight: 700; margin-bottom: 12px; }

.lang-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.lang-toggle button {
  padding: 6px 16px;
  font-size: 13px;
  border: 1px solid #bae6fd;
  border-radius: 30px;
  background: white;
  cursor: pointer;
}
.lang-toggle button.active {
  background: var(--primary);
  color: white;
}

.question { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; line-height: 1.6; }

.options { display: grid; gap: 12px; }
.option {
  padding: 18px 22px;
  border: 2px solid #bae6fd;
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.3s;
}
.option:hover { border-color: var(--primary); }
.option.selected { border-color: var(--primary); background: rgba(59,130,246,0.08); }
.option.correct { border-color: var(--success); background: rgba(16,185,129,0.1); color: var(--success); }
.option.wrong { border-color: var(--danger); background: rgba(239,68,68,0.1); color: var(--danger); }

.answer {
  margin-top: 20px;
  padding: 18px;
  background: #ecfdf5;
  border-radius: 16px;
  font-weight: 600;
  display: none;
}

.footer { text-align: center; margin: 40px 0; }
.btn-submit {
  padding: 16px 50px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>
<body>

<header class="header" id="header">
  <div class="header-inner">
    <div class="brand">🌐 NetMaster</div>

    <div class="go-to-q">
      <span>Go to Q:</span>
      <input type="number" id="gotoInput" placeholder="1-109" min="1" max="109" onkeypress="if(event.key==='Enter') goToQuestion()">
    </div>

    <div class="global-lang">
      <button id="globalGu" class="active" onclick="setGlobalLang('gu')">Gujarati</button>
      <button id="globalEn" onclick="setGlobalLang('en')">English</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="hero">
    <h1 class="hero-title">Computer Networks MCQ</h1>
    <p>109 Important Questions • English + Gujarati</p>
  </div>

  <div class="controls">
    <input type="text" id="search" class="search-box" 
           placeholder="Search Question / પ્રશ્ન શોધો..." onkeyup="filterMCQs()">
  </div>

  <div id="mcqContainer"></div>

  <div id="testFooter" class="footer" style="display:none;">
    <button class="btn-submit" onclick="submitTest()">Submit Test &amp; See Result</button>
  </div>

  <div id="scoreDisplay"></div>
</div>

<script>
// ==================== FULL 109 MCQs ====================
// Replace the comment below with your complete array of 109 questions (same as previous versions)
const mcqs = [
      {qEn:"1. The portion of physical layer that interfaces with the media access control sublayer is called ______", qGu:"1. ફિઝિકલ લેયરનો તે ભાગ જે મીડિયા એક્સેસ કંટ્રોલ સબલેયર સાથે ઇન્ટરફેસ કરે છે તેને ______ કહેવામાં આવે છે", optionsEn:["(A) physical signaling sublayer","(B) physical data sublayer","(C) physical address sublayer","(D) physical transport sublayer"], optionsGu:["(A) ફિઝિકલ સિગ્નલિંગ સબલેયર","(B) ફિઝિકલ ડેટા સબલેયર","(C) ફિઝિકલ એડ્રેસ સબલેયર","(D) ફિઝિકલ ટ્રાન્સપોર્ટ સબલેયર"], answer:"(A) physical signaling sublayer"},
      {qEn:"2. What is routing algorithm used by OSPF routing protocol?", qGu:"2. OSPF રાઉટિંગ પ્રોટોકોલ દ્વારા કયો રાઉટિંગ અલ્ગોરિધમ વપરાય છે?", optionsEn:["(A) Distance vector","(B) Flooding","(C) Path vector","(D) Link state"], optionsGu:["(A) ડિસ્ટન્સ વેક્ટર","(B) ફ્લડિંગ","(C) પાથ વેક્ટર","(D) લિંક સ્ટેટ"], answer:"(D) Link state"},
      {qEn:"3. In the communication of two processes, an endpoint for communication is called :", qGu:"3. બે પ્રક્રિયાઓના સંચારમાં, સંચાર માટેના અંતિમ બિંદુને કહેવામાં આવે છે :", optionsEn:["(A) Socket","(B) Pipe","(C) Port","(D) Remote procedure call"], optionsGu:["(A) સોકેટ","(B) પાઈપ","(C) પોર્ટ","(D) રિમોટ પ્રોસીજર કોલ"], answer:"(A) Socket"},
      {qEn:"4. Which of the following protocols may be used for accessing world wide Web?", qGu:"4. વર્લ્ડ વાઈડ વેબને એક્સેસ કરવા માટે નીચેના કયા પ્રોટોકોલનો ઉપયોગ કરી શકાય?", optionsEn:["(A) HTTP","(B) SMTP","(C) SLIP","(D) None of the above"], optionsGu:["(A) HTTP","(B) SMTP","(C) SLIP","(D) ઉપરોક્તમાંથી કોઈ નહીં"], answer:"(A) HTTP"},
      {qEn:"5. Web pages are created in a language called", qGu:"5. વેબ પેજીસ એક ભાષામાં બનાવવામાં આવે છે જેને કહેવામાં આવે છે", optionsEn:["(A) SLIP","(B) HTML","(C) HTTP","(D) WWW"], optionsGu:["(A) SLIP","(B) HTML","(C) HTTP","(D) WWW"], answer:"(B) HTML"},
      {qEn:"6. What is data encryption standard (DES)?", qGu:"6. ડેટા એન્ક્રિપ્શન સ્ટાન્ડર્ડ (DES) શું છે?", optionsEn:["(A) Block cipher","(B) Stream cipher","(C) Bit cipher","(D) None of the above"], optionsGu:["(A) બ્લોક સાઇફર","(B) સ્ટ્રીમ સાઇફર","(C) બિટ સાઇફર","(D) ઉપરોક્તમાંથી કોઈ નહીં"], answer:"(A) Block cipher"},
      {qEn:"7. On what type of switching does internet work?", qGu:"7. ઇન્ટરનેટ કયા પ્રકારના સ્વિચિંગ પર કામ કરે છે?", optionsEn:["(A) Circuit","(B) Bit","(C) Packet","(D) Line"], optionsGu:["(A) સર્કિટ","(B) બિટ","(C) પેકેટ","(D) લાઇન"], answer:"(C) Packet"},
      {qEn:"8. Which of the following techniques is used for transmitting digital signal?", qGu:"8. ડિજિટલ સિગ્નલ મોકલવા માટે નીચેની કઈ તકનીક વપરાય છે?", optionsEn:["(A) Amplitude modulation","(B) Frequency modulation","(C) Pulse code modulation","(D) Amplitude shift keying"], optionsGu:["(A) એમ્પ્લિટ્યુડ મોડ્યુલેશન","(B) ફ્રીક્વન્સી મોડ્યુલેશન","(C) પલ્સ કોડ મોડ્યુલેશન","(D) એમ્પ્લિટ્યુડ શિફ્ટ કીઇંગ"], answer:"(D) Amplitude shift keying"},
      {qEn:"9. Which of the following is an advantage of computer networks?", qGu:"9. કમ્પ્યુટર નેટવર્કનો કયો ફાયદો છે?", optionsEn:["(A) Resource sharing","(B) Improving reliability and availability","(C) Enhancing performance","(D) All of the above"], optionsGu:["(A) રિસોર્સ શેરિંગ","(B) વિશ્વસનીયતા અને ઉપલબ્ધતા સુધારવી","(C) પર્ફોર્મન્સ વધારવી","(D) ઉપરોક્ત બધા"], answer:"(D) All of the above"},
      {qEn:"10. A network spreading in different geographical locations is known as", qGu:"10. વિવિધ ભૌગોલિક સ્થાનોમાં ફેલાયેલા નેટવર્કને કહેવામાં આવે છે", optionsEn:["(A) LAN","(B) WAN","(C) Both (A) and (B)","(D) None of the above"], optionsGu:["(A) LAN","(B) WAN","(C) બંને (A) અને (B)","(D) ઉપરોક્તમાંથી કોઈ નહીં"], answer:"(B) WAN"},
      {qEn:"11. Which of the following is a token-based protocol?", qGu:"11. નીચેનામાંથી કયો ટોકન-આધારિત પ્રોટોકોલ છે?", optionsEn:["(A) CSMA/CD","(B) Slotted ring","(C) Both (A) and (B)","(D) None of the above"], optionsGu:["(A) CSMA/CD","(B) સ્લોટેડ રિંગ","(C) બંને (A) અને (B)","(D) ઉપરોક્તમાંથી કોઈ નહીં"], answer:"(C) Both (A) and (B)"},
      {qEn:"12. X.21 is", qGu:"12. X.21 શું છે?", optionsEn:["(A) a method of determining which device has access to the transmission medium at any time","(B) a method of access control technique or multiple access transmission media","(C) very common but oriented at linked protocol issued to ISO","(D) a network access standard for connecting stations to a circuit switch network"], optionsGu:["(A) એક પદ્ધતિ જે નક્કી કરે છે કે કયા ઉપકરણને ટ્રાન્સમિશન મીડિયમનો ઍક્સેસ છે","(B) મલ્ટિપલ એક્સેસ ટ્રાન્સમિશન મીડિયા માટે એક્સેસ કંટ્રોલ તકનીક","(C) ISOને જારી કરાયેલ લિંક્ડ પ્રોટોકોલ","(D) સર્કિટ સ્વિચ નેટવર્ક સાથે સ્ટેશન કનેક્ટ કરવાનો નેટવર્ક એક્સેસ સ્ટાન્ડર્ડ"], answer:"(D) a network access standard for connecting stations to a circuit switch network"},
      {qEn:"13. Which type of support for TFTP is available from third parties, but is not included in Windows NT?", qGu:"13. TFTP માટે કયા પ્રકારનો સપોર્ટ તૃતીય પક્ષો પાસે ઉપલબ્ધ છે, પરંતુ Windows NTમાં શામેલ નથી?", optionsEn:["(A) As client","(B) As server","(C) Windows NT includes full TFTP support","(D) None of the above"], optionsGu:["(A) ક્લાયન્ટ તરીકે","(B) સર્વર તરીકે","(C) Windows NTમાં પૂર્ણ TFTP સપોર્ટ છે","(D) ઉપરોક્તમાંથી કોઈ નહીં"], answer:"(B) As server"},
      {qEn:"14. The media access control sublayer resides in which OSI layer?", qGu:"14. મીડિયા એક્સેસ કંટ્રોલ સબલેયર કયા OSI લેયરમાં રહે છે?", optionsEn:["(A) Transport","(B) Network","(C) Physical","(D) Data link"], optionsGu:["(A) ટ્રાન્સપોર્ટ","(B) નેટવર્ક","(C) ફિઝિકલ","(D) ડેટા લિંક"], answer:"(D) Data link"},
      {qEn:"15. Which of the following is a communications protocol standard for securing credit card transactions over the Internet?", qGu:"15. ઇન્ટરનેટ પર ક્રેડિટ કાર્ડ ટ્રાન્ઝેક્શન સુરક્ષિત કરવા માટે કયો કોમ્યુનિકેશન પ્રોટોકોલ સ્ટાન્ડર્ડ છે?", optionsEn:["(A) Secure Electronic Transaction (SET)","(B) File Transfer Protocol (FTP)","(C) Post Office Protocol (POP)","(D) Hypertext Transfer Protocol (HTTP)"], optionsGu:["(A) Secure Electronic Transaction (SET)","(B) FTP","(C) POP","(D) HTTP"], answer:"(A) Secure Electronic Transaction (SET)"},
      {qEn:"16. A ______ can forward packets across different networks that may also use different protocols:", qGu:"16. ______ અલગ-અલગ નેટવર્ક વચ્ચે પેકેટ્સ ફોર્વર્ડ કરી શકે છે જે અલગ પ્રોટોકોલ પણ વાપરતા હોય:", optionsEn:["(A) repeater","(B) bridge","(C) router","(D) gateway"], optionsGu:["(A) રિપીટર","(B) બ્રિજ","(C) રાઉટર","(D) ગેટવે"], answer:"(D) gateway"},
      {qEn:"17. Which of the following is contention free protocol?", qGu:"17. નીચેનામાંથી કયો કોન્ટેન્શન ફ્રી પ્રોટોકોલ છે?", optionsEn:["(A) Pure Aloha","(B) Ethernet","(C) Non-persistent CSMA","(D) token Ring"], optionsGu:["(A) પ્યોર અલોહા","(B) ઇથરનેટ","(C) નોન-પર્સિસ્ટન્ટ CSMA","(D) ટોકન રિંગ"], answer:"(D) token Ring"},
      {qEn:"18. Encryption and decryption provide secrecy, or confidentiality, but not", qGu:"18. એન્ક્રિપ્શન અને ડિક્રિપ્શન ગુપ્તતા અથવા કન્ફિડેન્શિયાલિટી આપે છે, પરંતુ ______ નહીં", optionsEn:["(A) Authentication","(B) Integrity","(C) Frames","(D) All of these"], optionsGu:["(A) ઓથેન્ટિકેશન","(B) ઇન્ટિગ્રિટી","(C) ફ્રેમ્સ","(D) બધા"], answer:"(B) Integrity"},
      {qEn:"19. In symmetric key cryptography, for encrypting and decrypting the message, the key is", qGu:"19. સિમેટ્રિક કી ક્રિપ્ટોગ્રાફીમાં, મેસેજ એન્ક્રિપ્ટ અને ડિક્રિપ્ટ કરવા માટે કી ______ હોય છે", optionsEn:["(A) private","(B) public","(C) different","(D) same"], optionsGu:["(A) પ્રાઈવેટ","(B) પબ્લિક","(C) અલગ","(D) સમાન"], answer:"(D) same"},
      {qEn:"20. In early ARPANET, which routing method was used", qGu:"20. પ્રારંભિક ARPANETમાં કયી રાઉટિંગ પદ્ધતિ વપરાતી હતી?", optionsEn:["(A) Distance vector routing","(B) Link state routing","(C) Least cost routing","(D) Flooding"], optionsGu:["(A) ડિસ્ટન્સ વેક્ટર રાઉટિંગ","(B) લિંક સ્ટેટ રાઉટિંગ","(C) લીસ્ટ કોસ્ટ રાઉટિંગ","(D) ફ્લડિંગ"], answer:"(A) Distance vector routing"},
      {qEn:"21. Which of the 'following Ethernet encoding has the highest redundancy'", qGu:"21. નીચેના ઇથરનેટ એન્કોડિંગમાં સૌથી વધુ રીડન્ડન્સી કયામાં છે?", optionsEn:["(A) 1B2B","(B) 4B5B","(C) 5B6B","(D) 8B10B"], optionsGu:["(A) 1B2B","(B) 4B5B","(C) 5B6B","(D) 8B10B"], answer:"(D) 8B10B"},
      {qEn:"22. An Ethernet hub", qGu:"22. ઇથરનેટ હબ", optionsEn:["(A) functions as a repeater","(B) connects to a digital PBX","(C) connects to a token-ring network","(D) functions as a gateway"], optionsGu:["(A) રિપીટર તરીકે કામ કરે છે","(B) ડિજિટલ PBX સાથે જોડાય છે","(C) ટોકન-રિંગ નેટવર્ક સાથે જોડાય છે","(D) ગેટવે તરીકે કામ કરે છે"], answer:"(A) functions as a repeater"},
      {qEn:"23. If the bandwidth of a signal is 5 kHz and the lowest frequency is 52 kHz, what is the highest frequency", qGu:"23. જો સિગ્નલની બેન્ડવિડ્થ 5 kHz હોય અને નીચી ફ્રીક્વન્સી 52 kHz હોય, તો ઉચ્ચતમ ફ્રીક્વન્સી કેટલી છે?", optionsEn:["(A) 5kHz","(B) 10kHz","(C) 47kHz","(D) 57kHz"], optionsGu:["(A) 5kHz","(B) 10kHz","(C) 47kHz","(D) 57kHz"], answer:"(D) 57kHz"},
      {qEn:"24. Which of the following error detection techniques is based on binary division?", qGu:"24. નીચેની કઈ ભૂલ શોધવાની તકનીક બાઈનરી ડિવિઝન પર આધારિત છે?", optionsEn:["(A) Checksum","(B) Cyclic Redundancy Check (CRC)","(C) Simple parity check","(D) Two-dimensional parity check"], optionsGu:["(A) ચેકસમ","(B) સાયક્લિક રીડન્ડન્સી ચેક (CRC)","(C) સિમ્પલ પેરિટી ચેક","(D) ટુ-ડાયમેન્શનલ પેરિટી ચેક"], answer:"(B) Cyclic Redundancy Check (CRC)"},
      {qEn:"25. The length of an IPv6 address is:", qGu:"25. IPv6 એડ્રેસની લંબાઈ કેટલી છે?", optionsEn:["(A) 16 bits","(B) 32 bits","(C) 64 bits","(D) 128 bits"], optionsGu:["(A) 16 બિટ્સ","(B) 32 બિટ્સ","(C) 64 બિટ્સ","(D) 128 બિટ્સ"], answer:"(D) 128 bits"},

      {qEn:"27. Which of this is not a network edge device?", qGu:"27. નીચેનામાંથી કયું નેટવર્ક એજ ડિવાઇસ નથી?", optionsEn:["(A) PC","(B) Server","(C) Smartphone","(D) Switch"], optionsGu:["(A) PC","(B) સર્વર","(C) સ્માર્ટફોન","(D) સ્વિચ"], answer:"(D) Switch"},
      {qEn:"28. Application layer protocol defines:", qGu:"28. એપ્લિકેશન લેયર પ્રોટોકોલ વ્યાખ્યાયિત કરે છે:", optionsEn:["(A) types of messages exchanged","(B) rules for when and how processes send and respond to messages","(C) message format, syntax and semantics","(D) all of above"], optionsGu:["(A) મેસેજના પ્રકાર","(B) પ્રક્રિયાઓ ક્યારે અને કેવી રીતે મેસેજ મોકલે અને જવાબ આપે તેના નિયમો","(C) મેસેજ ફોર્મેટ, સિન્ટેક્સ અને સેમેન્ટિક્સ","(D) ઉપરોક્ત બધા"], answer:"(D) all of above"},
      {qEn:"29. The ______ is the physical path over which a message travels.", qGu:"29. ______ તે ભૌતિક માર્ગ છે જેના પર મેસેજ મુસાફરી કરે છે.", optionsEn:["(A) Path","(B) Protocol","(C) Route","(D) Medium"], optionsGu:["(A) પાથ","(B) પ્રોટોકોલ","(C) રૂટ","(D) મીડિયમ"], answer:"(D) Medium"},
      {qEn:"30. A set of rules that governs data communication:", qGu:"30. ડેટા કોમ્યુનિકેશનને નિયંત્રિત કરતા નિયમોનો સમૂહ:", optionsEn:["(A) Rule","(B) Medium","(C) Link","(D) Protocol"], optionsGu:["(A) નિયમ","(B) મીડિયમ","(C) લિંક","(D) પ્રોટોકોલ"], answer:"(D) Protocol"},
      {qEn:"31. Bluetooth is an example of:", qGu:"31. બ્લુટૂથ એક ઉદાહરણ છે:", optionsEn:["(A) local area network","(B) virtual private network","(C) personal area network","(D) none of the mentioned above"], optionsGu:["(A) લોકલ એરિયા નેટવર્ક","(B) વર્ચ્યુઅલ પ્રાઈવેટ નેટવર્ક","(C) પર્સનલ એરિયા નેટવર્ક","(D) ઉપરોક્તમાંથી કોઈ નહીં"], answer:"(C) personal area network"},
      {qEn:"32. Which protocol finds the MAC address from IP address?", qGu:"32. કયો પ્રોટોકોલ IP એડ્રેસમાંથી MAC એડ્રેસ શોધે છે?", optionsEn:["(A) SMTP","(B) ICMP","(C) ARP","(D) RARP"], optionsGu:["(A) SMTP","(B) ICMP","(C) ARP","(D) RARP"], answer:"(C) ARP"},
      {qEn:"33. The structure of format of data is called:", qGu:"33. ડેટાના ફોર્મેટની રચનાને કહેવામાં આવે છે:", optionsEn:["(A) Syntax","(B) Struct","(C) Semantic","(D) none of the above"], optionsGu:["(A) સિન્ટેક્સ","(B) સ્ટ્રક્ટ","(C) સેમેન્ટિક","(D) ઉપરોક્તમાંથી કોઈ નહીં"], answer:"(A) Syntax"},
      {qEn:"34. The first Network:", qGu:"34. પ્રથમ નેટવર્ક:", optionsEn:["(A) ARPANET","(B) NFSNET","(C) CNNET","(D) ASAPNET"], optionsGu:["(A) ARPANET","(B) NFSNET","(C) CNNET","(D) ASAPNET"], answer:"(A) ARPANET"},
      {qEn:"35. The noise due to random behavior of charge based carriers is:", qGu:"35. ચાર્જ આધારિત કેરિયર્સના રેન્ડમ વર્તનને કારણે થતો અવાજ:", optionsEn:["(A) Partition noise","(B) Industrial noise","(C) Shot noise","(D) Flicker noise"], optionsGu:["(A) પાર્ટિશન નોઈઝ","(B) ઇન્ડસ્ટ્રિયલ નોઈઝ","(C) શોટ નોઈઝ","(D) ફ્લિકર નોઈઝ"], answer:"(C) Shot noise"},
      {qEn:"36. Which one of the following fields of an IP header is NOT modified by a typical IP router?", qGu:"36. IP હેડરના નીચેના કયા ક્ષેત્રને સામાન્ય IP રાઉટર સુધારતું નથી?", optionsEn:["(A) Checksum","(B) Source address","(C) Time to Live (TTL)","(D) Length"], optionsGu:["(A) ચેકસમ","(B) સોર્સ એડ્રેસ","(C) ટાઇમ ટુ લાઇવ (TTL)","(D) લેંગ્થ"], answer:"(B) Source address"},
      {qEn:"37. In one of the pairs of protocols given below, both the protocols can use multiple TCP connections between the same client and the server. Which one is that?", qGu:"37. નીચે આપેલા પ્રોટોકોલ્સના જોડીમાંથી કઈ જોડીમાં બંને પ્રોટોકોલ એક જ ક્લાયન્ટ અને સર્વર વચ્ચે મલ્ટિપલ TCP કનેક્શન વાપરી શકે છે?", optionsEn:["(A) HTTP, FTP","(B) HTTP, TELNET","(C) FTP, SMTP","(D) HTTP, SMTP"], optionsGu:["(A) HTTP, FTP","(B) HTTP, TELNET","(C) FTP, SMTP","(D) HTTP, SMTP"], answer:"(D) HTTP, SMTP"},
      {qEn:"38. Which of the following socket API function converts an unconnected active TCP socket into a passive socket?", qGu:"38. નીચેના સોકેટ API ફંક્શનમાંથી કયું અનકનેક્ટેડ એક્ટિવ TCP સોકેટને પેસિવ સોકેટમાં બદલે છે?", optionsEn:["(A) connect","(B) bind","(C) listen","(D) accept"], optionsGu:["(A) કનેક્ટ","(B) બાઇન્ડ","(C) લિસ્ટન","(D) એક્સેપ્ટ"], answer:"(C) listen"},
      {qEn:"39. Which of the following transport layer protocols is used to support electronic mail?", qGu:"39. ઇલેક્ટ્રોનિક મેઇલને સપોર્ટ કરવા માટે કયો ટ્રાન્સપોર્ટ લેયર પ્રોટોકોલ વપરાય છે?", optionsEn:["(A) SMTP","(B) IP","(C) TCP","(D) UDP"], optionsGu:["(A) SMTP","(B) IP","(C) TCP","(D) UDP"], answer:"(C) TCP"},
      {qEn:"40. The protocol data unit (PDU) for the application layer in the Internet stack is", qGu:"40. ઇન્ટરનેટ સ્ટેકમાં એપ્લિકેશન લેયર માટે પ્રોટોકોલ ડેટા યુનિટ (PDU) છે", optionsEn:["(A) Segment","(B) Datagram","(C) Message","(D) Frame"], optionsGu:["(A) સેગમેન્ટ","(B) ડેટાગ્રામ","(C) મેસેજ","(D) ફ્રેમ"], answer:"(C) Message"},
      {qEn:"41. IP address consists of ____ parts separated by dots", qGu:"41. IP એડ્રેસમાં ____ ભાગ હોય છે જે ડોટથી અલગ પડેલા હોય છે", optionsEn:["(A) 2","(B) 3","(C) 4","(D) 1"], optionsGu:["(A) 2","(B) 3","(C) 4","(D) 1"], answer:"(C) 4"},
      {qEn:"42. Domain name matching to IP address is performed by", qGu:"42. ડોમેન નામને IP એડ્રેસ સાથે મેચ કરવાનું કામ કોણ કરે છે?", optionsEn:["(A) Electronic mail","(B) URL","(C) DNS","(D) FTP"], optionsGu:["(A) ઇલેક્ટ્રોનિક મેઇલ","(B) URL","(C) DNS","(D) FTP"], answer:"(C) DNS"},
      {qEn:"43. 'Internet' is an example of", qGu:"43. 'ઇન્ટરનેટ' એક ઉદાહરણ છે", optionsEn:["(A) LAN","(B) MAN","(C) WAN","(D) None of these"], optionsGu:["(A) LAN","(B) MAN","(C) WAN","(D) આમાંથી કોઈ નહીં"], answer:"(C) WAN"},
      {qEn:"44. If a computer network cable is broken whole network goes down in ____ topology", qGu:"44. જો કમ્પ્યુટર નેટવર્ક કેબલ તૂટી જાય તો આખું નેટવર્ક ____ ટોપોલોજીમાં ડાઉન થઈ જાય છે", optionsEn:["(A) Star","(B) Ring","(C) Mesh","(D) All options are correct"], optionsGu:["(A) સ્ટાર","(B) રિંગ","(C) મેશ","(D) બધા વિકલ્પો સાચા છે"], answer:"(B) Ring"},
      {qEn:"45. Which of the following is a most reliable topology?", qGu:"45. નીચેની કઈ ટોપોલોજી સૌથી વધુ વિશ્વસનીય છે?", optionsEn:["(A) Bus","(B) Star","(C) Ring","(D) Mesh"], optionsGu:["(A) બસ","(B) સ્ટાર","(C) રિંગ","(D) મેશ"], answer:"(D) Mesh"},
      {qEn:"46. Hierarchical topology is used to establish a network which is also known as", qGu:"46. હાયરાર્કિકલ ટોપોલોજીનો ઉપયોગ નેટવર્ક સ્થાપિત કરવા માટે થાય છે જેને ______ તરીકે પણ ઓળખવામાં આવે છે", optionsEn:["(A) Bus network","(B) Star network","(C) Tree network","(D) Mesh network"], optionsGu:["(A) બસ નેટવર્ક","(B) સ્ટાર નેટવર્ક","(C) ટ્રી નેટવર્ક","(D) મેશ નેટવર્ક"], answer:"(C) Tree network"},
      {qEn:"47. MAN stands for", qGu:"47. MAN નું પૂર્ણ નામ છે", optionsEn:["(A) Machine Area Network","(B) Metropolitan Area Network","(C) Metropolitan Asynchronous Network","(D) Machine asynchronous Network"], optionsGu:["(A) મશીન એરિયા નેટવર્ક","(B) મેટ્રોપોલિટન એરિયા નેટવર્ક","(C) મેટ્રોપોલિટન એસિંક્રોનસ નેટવર્ક","(D) મશીન એસિંક્રોનસ નેટવર્ક"], answer:"(B) Metropolitan Area Network"},
      {qEn:"48. Which of the following component is responsible for network communication in a computer system?", qGu:"48. કમ્પ્યુટર સિસ્ટમમાં નેટવર્ક કોમ્યુનિકેશન માટે કયો ઘટક જવાબદાર છે?", optionsEn:["(A) UPS","(B) Ethernet card","(C) SVGA card","(D) SMPS"], optionsGu:["(A) UPS","(B) ઇથરનેટ કાર્ડ","(C) SVGA કાર્ડ","(D) SMPS"], answer:"(B) Ethernet card"},
      {qEn:"49. Which of the following has minimum transmission speed?", qGu:"49. નીચેનામાંથી કયામાં ન્યૂનતમ ટ્રાન્સમિશન સ્પીડ છે?", optionsEn:["(A) Twisted pair wire","(B) Fiber optic cable","(C) Coaxial cable","(D) Microwave"], optionsGu:["(A) ટ્વિસ્ટેડ પેર વાયર","(B) ફાઇબર ઓપ્ટિક કેબલ","(C) કોએક્સિયલ કેબલ","(D) માઇક્રોવેવ"], answer:"(A) Twisted pair wire"},
      {qEn:"50. Speed of internet connection is measured in", qGu:"50. ઇન્ટરનેટ કનેક્શનની ઝડપ કયા એકમમાં માપવામાં આવે છે?", optionsEn:["(A) Kilo bits per second","(B) Kilo Boolean per second","(C) Meter per second","(D) None of these"], optionsGu:["(A) કિલો બિટ્સ પર સેકન્ડ","(B) કિલો બુલિયન પર સેકન્ડ","(C) મીટર પર સેકન્ડ","(D) આમાંથી કોઈ નહીં"], answer:"(A) Kilo bits per second"},
      {qEn:"51. Error correction can be done by using", qGu:"51. ભૂલ સુધારણા કરી શકાય છે", optionsEn:["(A) Hamming code","(B) CRC","(C) Framing","(D) Two dimensional parity check"], optionsGu:["(A) હેમિંગ કોડ","(B) CRC","(C) ફ્રેમિંગ","(D) ટુ ડાયમેન્શનલ પેરિટી ચેક"], answer:"(A) Hamming code"},
      {qEn:"52. TCP/IP is an example of", qGu:"52. TCP/IP એક ઉદાહરણ છે", optionsEn:["(A) Communication protocol","(B) Networking protocol","(C) Data transfer protocol","(D) All options are correct"], optionsGu:["(A) કોમ્યુનિકેશન પ્રોટોકોલ","(B) નેટવર્કિંગ પ્રોટોકોલ","(C) ડેટા ટ્રાન્સફર પ્રોટોકોલ","(D) બધા વિકલ્પો સાચા છે"], answer:"(D) All options are correct"},
      {qEn:"53. In a computer network, which of the following is a connecting device?", qGu:"53. કમ્પ્યુટર નેટવર્કમાં, નીચેનામાંથી કયું કનેક્ટિંગ ડિવાઇસ છે?", optionsEn:["(A) Router","(B) Hub","(C) Switch","(D) All options are correct"], optionsGu:["(A) રાઉટર","(B) હબ","(C) સ્વિચ","(D) બધા વિકલ્પો સાચા છે"], answer:"(D) All options are correct"},
      {qEn:"54. ______ is a device that combines transmission from various I/O devices into one line", qGu:"54. ______ એવું ડિવાઇસ છે જે વિવિધ I/O ડિવાઇસીસના ટ્રાન્સમિશનને એક લાઇનમાં જોડે છે", optionsEn:["(A) Modifier","(B) Multiplexer","(C) Concentrator","(D) Gateway"], optionsGu:["(A) મોડિફાયર","(B) મલ્ટિપ્લેક્સર","(C) કોન્સન્ટ્રેટર","(D) ગેટવે"], answer:"(B) Multiplexer"},
      {qEn:"55. The amount of data transmitted in a fixed amount of time is called", qGu:"55. નિશ્ચિત સમયમાં ટ્રાન્સમિટ થતા ડેટાની માત્રાને કહેવામાં આવે છે", optionsEn:["(A) Refresh rate","(B) Resolution","(C) Bandwidth","(D) Frequency"], optionsGu:["(A) રિફ્રેશ રેટ","(B) રિઝોલ્યુશન","(C) બેન્ડવિડ્થ","(D) ફ્રીક્વન્સી"], answer:"(C) Bandwidth"},
      {qEn:"56. During data transmission, parity bits are attached with data bits for detecting", qGu:"56. ડેટા ટ્રાન્સમિશન દરમિયાન, પેરિટી બિટ્સ ડેટા બિટ્સ સાથે જોડવામાં આવે છે ______ શોધવા માટે", optionsEn:["(A) Buffer size","(B) Destination","(C) Errors","(D) None of these"], optionsGu:["(A) બફર સાઇઝ","(B) ડેસ્ટિનેશન","(C) ભૂલો","(D) આમાંથી કોઈ નહીં"], answer:"(C) Errors"},
      {qEn:"57. In communication satellite, multiple repeaters are known as", qGu:"57. કોમ્યુનિકેશન સેટેલાઇટમાં, અનેક રિપીટર્સને કહેવામાં આવે છે", optionsEn:["(A) Detector","(B) Modulator","(C) Stations","(D) Transponders"], optionsGu:["(A) ડિટેક્ટર","(B) મોડ્યુલેટર","(C) સ્ટેશન્સ","(D) ટ્રાન્સપોન્ડર્સ"], answer:"(D) Transponders"},
      {qEn:"58. 'Communication protocol' means", qGu:"58. 'કોમ્યુનિકેશન પ્રોટોકોલ'નો અર્થ છે", optionsEn:["(A) Data transformation","(B) Set of rules to communicate data from one machine to another machine","(C) Transmission signals","(D) None of these"], optionsGu:["(A) ડેટા ટ્રાન્સફોર્મેશન","(B) એક મશીનથી બીજા મશીનમાં ડેટા કોમ્યુનિકેટ કરવાના નિયમોનો સમૂહ","(C) ટ્રાન્સમિશન સિગ્નલ્સ","(D) આમાંથી કોઈ નહીં"], answer:"(B) Set of rules to communicate data from one machine to another machine"},
      {qEn:"59. At network layer, the data packet is known by name", qGu:"59. નેટવર્ક લેયરમાં, ડેટા પેકેટને ______ તરીકે ઓળખવામાં આવે છે", optionsEn:["(A) Frame","(B) Packet","(C) Datagram","(D) Circuit"], optionsGu:["(A) ફ્રેમ","(B) પેકેટ","(C) ડેટાગ્રામ","(D) સર્કિટ"], answer:"(B) Packet"},
      {qEn:"60. A network using ____ technique is called a store and forward network", qGu:"60. ____ ટેક્નિક વાપરતું નેટવર્ક સ્ટોર અને ફોર્વર્ડ નેટવર્ક કહેવાય છે", optionsEn:["(A) Circuit switching","(B) Message switching","(C) Packet switching","(D) Both (Circuit switching) and (Message switching)"], optionsGu:["(A) સર્કિટ સ્વિચિંગ","(B) મેસેજ સ્વિચિંગ","(C) પેકેટ સ્વિચિંગ","(D) બંને"], answer:"(B) Message switching"},
      {qEn:"61. File server is a ____ which is used to store files received from various client machines", qGu:"61. ફાઇલ સર્વર એ ______ છે જે વિવિધ ક્લાયન્ટ મશીન્સમાંથી મળેલી ફાઇલ્સ સ્ટોર કરે છે", optionsEn:["(A) Specialized computer system","(B) Modem","(C) Router","(D) Transponder"], optionsGu:["(A) સ્પેશિયલાઇઝ્ડ કમ્પ્યુટર સિસ્ટમ","(B) મોડેમ","(C) રાઉટર","(D) ટ્રાન્સપોન્ડર"], answer:"(A) Specialized computer system"},
      {qEn:"62. Which of the following is a recovery technique?", qGu:"62. નીચેનામાંથી કયી રિકવરી તકનીક છે?", optionsEn:["(A) Public key encryption","(B) Shadow paging","(C) Hash file organization","(D) Indexed file organization"], optionsGu:["(A) પબ્લિક કી એન્ક્રિપ્શન","(B) શેડો પેજિંગ","(C) હેશ ફાઇલ ઓર્ગેનાઇઝેશન","(D) ઇન્ડેક્સ્ડ ફાઇલ ઓર્ગેનાઇઝેશન"], answer:"(B) Shadow paging"},

      {qEn:"64. When a DNS serve accepts and uses incorrect information from a host that has no authority giving that information, then it is called", qGu:"64. જ્યારે DNS સર્વર અધિકાર વિનાના હોસ્ટમાંથી ખોટી માહિતી સ્વીકારે અને વાપરે ત્યારે તેને કહેવામાં આવે છે", optionsEn:["(A) DNS lookup","(B) DNS hijacking","(C) DNS spoofing","(D) None of the mentioned"], optionsGu:["(A) DNS લુકઅપ","(B) DNS હાઇજેકિંગ","(C) DNS સ્પૂફિંગ","(D) ઉપરોક્તમાંથી કોઈ નહીં"], answer:"(C) DNS spoofing"},
      {qEn:"65. What is the maximum size of data that application layer can pass on to the TCP layer below?", qGu:"65. એપ્લિકેશન લેયર TCP લેયરને મહત્તમ કેટલા સાઇઝનો ડેટા પાસ કરી શકે છે?", optionsEn:["(A) Any size","(B) (2^16 bytes – the size of TCP header)","(C) 2^16 bytes","(D) 1500 bytes"], optionsGu:["(A) કોઈ પણ સાઇઝ","(B) (2^16 બાઇટ્સ – TCP હેડરનું સાઇઝ)","(C) 2^16 બાઇટ્સ","(D) 1500 બાઇટ્સ"], answer:"(A) Any size"},
      {qEn:"66. Bit stuffing refers to", qGu:"66. બિટ સ્ટફિંગનો અર્થ છે", optionsEn:["(A) Inserting a '0' in user stream to differentiate it with a flag","(B) Inserting a '0' in flag stream to avoid ambiguity","(C) appending a nibble to the flag sequence","(D) Appending a nibble to the user data stream"], optionsGu:["(A) યુઝર સ્ટ્રીમમાં '0' નાખવું જેથી ફ્લેગથી અલગ પડે","(B) ફ્લેગ સ્ટ્રીમમાં '0' નાખવું","(C) ફ્લેગ સિક્વન્સમાં નિબલ ઉમેરવું","(D) યુઝર ડેટા સ્ટ્રીમમાં નિબલ ઉમેરવું"], answer:"(A) Inserting a '0' in user stream to differentiate it with a flag"},
      {qEn:"67. Dynamic routing protocol enable routers to:", qGu:"67. ડાયનેમિક રાઉટિંગ પ્રોટોકોલ રાઉટર્સને સક્ષમ કરે છે:", optionsEn:["(A) Dynamically discover and maintain routes","(B) distribute routing updates to other routers","(C) Reach agreement with other routers about the network topology","(D) All of the above"], optionsGu:["(A) ડાયનેમિક રીતે રૂટ્સ શોધવા અને જાળવવા","(B) અન્ય રાઉટર્સને રાઉટિંગ અપડેટ્સ વિતરિત કરવા","(C) નેટવર્ક ટોપોલોજી વિશે અન્ય રાઉટર્સ સાથે સમજૂતી કરવી","(D) ઉપરોક્ત બધા"], answer:"(D) All of the above"},
      {qEn:"68. In Ethernet CSMA/CD, the special bit sequence is transmitted by media access management to handle collision is called", qGu:"68. ઇથરનેટ CSMA/CDમાં, કોલિઝન હેન્ડલ કરવા માટે મીડિયા એક્સેસ મેનેજમેન્ટ દ્વારા મોકલવામાં આવતી વિશેષ બિટ સિક્વન્સને કહેવામાં આવે છે", optionsEn:["(A) Preamble","(B) Post amble","(C) Jam","(D) None of these"], optionsGu:["(A) પ્રીએમ્બલ","(B) પોસ્ટ એમ્બલ","(C) જેમ","(D) આમાંથી કોઈ નહીં"], answer:"(C) Jam"},
      {qEn:"69. Which network protocol allows hosts to dynamically get a unique IP number on each bootup?", qGu:"69. કયો નેટવર્ક પ્રોટોકોલ હોસ્ટ્સને દરેક બુટઅપ પર યુનિક IP નંબર મેળવવા દે છે?", optionsEn:["(A) DHCP","(B) BOOTP","(C) RARP","(D) ARP"], optionsGu:["(A) DHCP","(B) BOOTP","(C) RARP","(D) ARP"], answer:"(A) DHCP"},
      {qEn:"70. The address of a class B host is to be split into subnets with a 6-bit subnet number. What is the maximum number of subnets and the maximum number of hosts in each subnet?", qGu:"70. ક્લાસ B હોસ્ટના એડ્રેસને 6-બિટ સબનેટ નંબર સાથે સબનેટ્સમાં વિભાજિત કરવામાં આવે છે. સબનેટ્સ અને દરેક સબનેટમાં મહત્તમ હોસ્ટ્સની સંખ્યા કેટલી?", optionsEn:["(A) 62 subnets","(B) 64 subnets and 262142 hosts","(C) 62 subnets and 262142 hosts","(D) 64 subnets and 1022 hosts"], optionsGu:["(A) 62 સબનેટ્સ","(B) 64 સબનેટ્સ અને 262142 હોસ્ટ્સ","(C) 62 સબનેટ્સ અને 262142 હોસ્ટ્સ","(D) 64 સબનેટ્સ અને 1022 હોસ્ટ્સ"], answer:"(C) 62 subnets and 262142 hosts"},
      {qEn:"71. In a token ring network, the transmission speed is 107 bps and the propagation speed is 200 m/μs. Then 1 bit delay in this network is equivalent to", qGu:"71. ટોકન રિંગ નેટવર્કમાં, ટ્રાન્સમિશન સ્પીડ 10^7 bps અને પ્રોપગેશન સ્પીડ 200 m/μs છે. તો 1 બિટ ડિલે આ નેટવર્કમાં ______ બરાબર છે", optionsEn:["(A) 500 m of cable","(B) 200 m of cable","(C) 20 m of cable","(D) 50 m of cable"], optionsGu:["(A) 500 મીટર કેબલ","(B) 200 મીટર કેબલ","(C) 20 મીટર કેબલ","(D) 50 મીટર કેબલ"], answer:"(C) 20 m of cable"},
      {qEn:"72. One SAN switch has 24 ports. All 24 port supports 8 Gbps fiber Channel technology. What is the aggregate bandwidth of that SAN switch?", qGu:"72. એક SAN સ્વિચમાં 24 પોર્ટ્સ છે. બધા 24 પોર્ટ 8 Gbps ફાઇબર ચેનલ ટેક્નોલોજી સપોર્ટ કરે છે. તે SAN સ્વિચની એગ્રીગેટ બેન્ડવિડ્થ કેટલી છે?", optionsEn:["(A) 96 Gbps","(B) 192 Mbps","(C) 512 Gbps","(D) 192 Gbps"], optionsGu:["(A) 96 Gbps","(B) 192 Mbps","(C) 512 Gbps","(D) 192 Gbps"], answer:"(D) 192 Gbps"},
      {qEn:"73. Lightweight Directory Access Protocol is used for", qGu:"73. લાઇટવેઇટ ડિરેક્ટરી એક્સેસ પ્રોટોકોલનો ઉપયોગ ______ માટે થાય છે", optionsEn:["(A) Routing the packets","(B) Authentication","(C) Obtaining IP address","(D) Domain name resolving"], optionsGu:["(A) પેકેટ્સ રાઉટિંગ","(B) ઓથેન્ટિકેશન","(C) IP એડ્રેસ મેળવવા","(D) ડોમેન નામ રિઝોલ્વ કરવા"], answer:"(B) Authentication"},

      {qEn:"75. Which RAID level gives block level striping with double distributed parity?", qGu:"75. કયા RAID લેવલમાં બ્લોક લેવલ સ્ટ્રાઇપિંગ સાથે ડબલ ડિસ્ટ્રિબ્યુટેડ પેરિટી હોય છે?", optionsEn:["(A) RAID 10","(B) RAID 2","(C) RAID 6","(D) RAID 5"], optionsGu:["(A) RAID 10","(B) RAID 2","(C) RAID 6","(D) RAID 5"], answer:"(C) RAID 6"},
      {qEn:"76. The IEEE standard for Wi-Max technology is", qGu:"76. Wi-Max ટેક્નોલોજી માટે IEEE સ્ટાન્ડર્ડ છે", optionsEn:["(A) IEEE 802.16","(B) IEEE 802.36","(C) IEEE 812.16","(D) IEEE 806.16"], optionsGu:["(A) IEEE 802.16","(B) IEEE 802.36","(C) IEEE 812.16","(D) IEEE 806.16"], answer:"(A) IEEE 802.16"},
      {qEn:"77. The encoding technique used to transmit the signal in giga Ethernet technology over fiber optic medium is", qGu:"77. ગીગા ઇથરનેટ ટેક્નોલોજીમાં ફાઇબર ઓપ્ટિક મીડિયમ પર સિગ્નલ ટ્રાન્સમિટ કરવા માટે વપરાતી એન્કોડિંગ તકનીક છે", optionsEn:["(A) Differential manchester encoding","(B) Non Return to zero","(C) 4B/5B encoding","(D) 8B/10B encoding"], optionsGu:["(A) ડિફરેન્શિયલ મેન્ચેસ્ટર એન્કોડિંગ","(B) નોન રિટર્ન ટુ ઝીરો","(C) 4B/5B એન્કોડિંગ","(D) 8B/10B એન્કોડિંગ"], answer:"(D) 8B/10B encoding"},

      {qEn:"79. The subnet mask for a particular network is 255.255.31.0 which of the following pairs of IP addresses could belong to this network?", qGu:"79. એક નેટવર્ક માટે સબનેટ માસ્ક 255.255.31.0 છે. નીચેના કયા IP એડ્રેસની જોડી આ નેટવર્કમાં હોઈ શકે?", optionsEn:["(A) 172.57.88.62 and 172.56.87.23","(B) 10.35.28.2 and 10.35.29.4","(C) 191.203.31.87 and 191.234.31.88","(D) 128.8.129.43 and 128.8.161.55"], optionsGu:["(A) 172.57.88.62 અને 172.56.87.23","(B) 10.35.28.2 અને 10.35.29.4","(C) 191.203.31.87 અને 191.234.31.88","(D) 128.8.129.43 અને 128.8.161.55"], answer:"(D) 128.8.129.43 and 128.8.161.55"},
      {qEn:"80. In networking, UTP stands for", qGu:"80. નેટવર્કિંગમાં, UTP નું પૂર્ણ નામ છે", optionsEn:["(A) Unshielded T- connector port","(B) Unshielded twisted pair","(C) Unshielded terminating pair","(D) Unshielded transmission process"], optionsGu:["(A) અનશિલ્ડેડ T- કનેક્ટર પોર્ટ","(B) અનશિલ્ડેડ ટ્વિસ્ટેડ પેર","(C) અનશિલ્ડેડ ટર્મિનેટિંગ પેર","(D) અનશિલ્ડેડ ટ્રાન્સમિશન પ્રોસેસ"], answer:"(B) Unshielded twisted pair"},
      {qEn:"81. Which of the following is a MAC address?", qGu:"81. નીચેનામાંથી કયું MAC એડ્રેસ છે?", optionsEn:["(A) 192.166.200.50","(B) 00056A:01A01A5CCA7FF60","(C) 568, Airport Road","(D) 01:A5:BB:A7:FF:60"], optionsGu:["(A) 192.166.200.50","(B) 00056A:01A01A5CCA7FF60","(C) 568, Airport Road","(D) 01:A5:BB:A7:FF:60"], answer:"(D) 01:A5:BB:A7:FF:60"},
      {qEn:"82. Physical topology of FDDI is?", qGu:"82. FDDIની ફિઝિકલ ટોપોલોજી છે?", optionsEn:["(A) Bus","(B) Ring","(C) Star","(D) None of the above"], optionsGu:["(A) બસ","(B) રિંગ","(C) સ્ટાર","(D) ઉપરોક્તમાંથી કોઈ નહીં"], answer:"(B) Ring"},
      {qEn:"83. What is the primary purpose of a VLAN?", qGu:"83. VLANનો મુખ્ય હેતુ શું છે?", optionsEn:["(A) Demonstrating the proper layout for a network","(B) Simulating a network","(C) To create a virtual private network","(D) Segmenting a network inside a switch or device"], optionsGu:["(A) નેટવર્કનું યોગ્ય લેઆઉટ દર્શાવવું","(B) નેટવર્ક સિમ્યુલેટ કરવું","(C) વર્ચ્યુઅલ પ્રાઈવેટ નેટવર્ક બનાવવું","(D) સ્વિચ અથવા ડિવાઇસ અંદર નેટવર્કને સેગમેન્ટ કરવું"], answer:"(D) Segmenting a network inside a switch or device"},
      {qEn:"84. SHA-1 is a", qGu:"84. SHA-1 એક ______ છે", optionsEn:["(A) Encryption algorithm","(B) Decryption algorithm","(C) Key exchange algorithm","(D) Message digest function."], optionsGu:["(A) એન્ક્રિપ્શન અલ્ગોરિધમ","(B) ડિક્રિપ્શન અલ્ગોરિધમ","(C) કી એક્સચેન્જ અલ્ગોરિધમ","(D) મેસેજ ડાયજેસ્ટ ફંક્શન"], answer:"(D) Message digest function."},
      {qEn:"85. Advanced Encryption Standard (AES) is based on", qGu:"85. એડવાન્સ્ડ એન્ક્રિપ્શન સ્ટાન્ડર્ડ (AES) ______ પર આધારિત છે", optionsEn:["(A) Asymmetric key algorithm","(B) Symmetric key algorithm","(C) Public key algorithm","(D) Key exchange"], optionsGu:["(A) અસિમેટ્રિક કી અલ્ગોરિધમ","(B) સિમેટ્રિક કી અલ્ગોરિધમ","(C) પબ્લિક કી અલ્ગોરિધમ","(D) કી એક્સચેન્જ"], answer:"(B) Symmetric key algorithm"},
      {qEn:"86. Which one of these is characteristic of RAID 5?", qGu:"86. નીચેનામાંથી કયું RAID 5ની વિશેષતા છે?", optionsEn:["(A) Dedicated parity","(B) Double parity","(C) Hamming code parity","(D) Distributed parity"], optionsGu:["(A) ડેડિકેટેડ પેરિટી","(B) ડબલ પેરિટી","(C) હેમિંગ કોડ પેરિટી","(D) ડિસ્ટ્રિબ્યુટેડ પેરિટી"], answer:"(D) Distributed parity"},
      {qEn:"87. Which protocol suite designed by IETF to provide security for a packet at the Internet layer?", qGu:"87. IETF દ્વારા ડિઝાઇન કરાયેલ કયો પ્રોટોકોલ સ્યુટ ઇન્ટરનેટ લેયર પર પેકેટની સુરક્ષા આપે છે?", optionsEn:["(A) IP sec","(B) Net Sec","(C) Packet Sec","(D) SSL"], optionsGu:["(A) IP sec","(B) Net Sec","(C) Packet Sec","(D) SSL"], answer:"(A) IP sec"},
      {qEn:"88. The default subnet mask for a class B network can be", qGu:"88. ક્લાસ B નેટવર્ક માટે ડિફોલ્ટ સબનેટ માસ્ક ______ હોઈ શકે છે", optionsEn:["(A) 255.255.255.0","(B) 255.0.0.0","(C) 255.255.192.0","(D) 255.255.0.0"], optionsGu:["(A) 255.255.255.0","(B) 255.0.0.0","(C) 255.255.192.0","(D) 255.255.0.0"], answer:"(D) 255.255.0.0"},
      {qEn:"89. If there are n devices (nodes) in a network, what is the number of cable links required for a fully connected mesh and a star topology respectively", qGu:"89. જો નેટવર્કમાં n ડિવાઇસ (નોડ્સ) હોય, તો ફુલી કનેક્ટેડ મેશ અને સ્ટાર ટોપોલોજી માટે કેબલ લિંક્સની સંખ્યા કેટલી?", optionsEn:["(A) n(n-1)/2, n-1","(B) n, n-1","(C) n-1, n","(D) n-1, n(n-1)/2"], optionsGu:["(A) n(n-1)/2, n-1","(B) n, n-1","(C) n-1, n","(D) n-1, n(n-1)/2"], answer:"(A) n(n-1)/2, n-1"},
      {qEn:"90. Which of the following protocol is used for transferring electronic mail messages from one machine to another?", qGu:"90. ઇલેક્ટ્રોનિક મેઇલ મેસેજ એક મશીનથી બીજા મશીનમાં ટ્રાન્સફર કરવા માટે કયો પ્રોટોકોલ વપરાય છે?", optionsEn:["(A) TELNET","(B) FTP","(C) SNMP","(D) SMTP"], optionsGu:["(A) TELNET","(B) FTP","(C) SNMP","(D) SMTP"], answer:"(D) SMTP"},
      {qEn:"91. An Ethernet frame that is less than the IEEE 802.3 minimum length of 64 octets is called", qGu:"91. IEEE 802.3ની ન્યૂનતમ લંબાઈ 64 ઓક્ટેટ્સ કરતાં ઓછું હોય તેવા ઇથરનેટ ફ્રેમને કહેવામાં આવે છે", optionsEn:["(A) Short frame","(B) Small frame","(C) Mini frame","(D) Runt frame"], optionsGu:["(A) શોર્ટ ફ્રેમ","(B) સ્મોલ ફ્રેમ","(C) મિની ફ્રેમ","(D) રન્ટ ફ્રેમ"], answer:"(D) Runt frame"},
      {qEn:"92. Match with the suitable one:", qGu:"92. યોગ્ય સાથે મેચ કરો:", optionsEn:["(A) A-2, B-3, C-4, D-1","(B) A-2, B-4, C-3, D-1","(C) A-3, B-4, C-1, D-2","(D) A-3, B-1, C-4, D-2"], optionsGu:["(A) A-2, B-3, C-4, D-1","(B) A-2, B-4, C-3, D-1","(C) A-3, B-4, C-1, D-2","(D) A-3, B-1, C-4, D-2"], answer:"(A) A-2, B-3, C-4, D-1"},
      {qEn:"93. Optimal Asymmetric Encryption Padding is employed in RSA to counter", qGu:"93. RSAમાં Optimal Asymmetric Encryption Padding ______ના વિરોધમાં વપરાય છે", optionsEn:["(A) Known Cipher text Attack","(B) Chosen Cipher text attack","(C) Known Plaintext Attack","(D) Chosen Plaintext Attack"], optionsGu:["(A) Known Cipher text Attack","(B) Chosen Cipher text attack","(C) Known Plaintext Attack","(D) Chosen Plaintext Attack"], answer:"(B) Chosen Cipher text attack"},
      {qEn:"94. In digital Signature Schemes, ............ is used for ............ whereas ............ is used for ............", qGu:"94. ડિજિટલ સિગ્નેચર સ્કીમમાં, ............ ______ માટે વપરાય છે જ્યારે ............ ______ માટે વપરાય છે", optionsEn:["(A) Private Key, Encryption, Public Key, Decryption","(B) Private Key, Decryption, Public Key, Encryption","(C) DES, Encryption, DES, Decryption","(D) None of the above is correct sequence of word"], optionsGu:["(A) પ્રાઈવેટ કી, એન્ક્રિપ્શન, પબ્લિક કી, ડિક્રિપ્શન","(B) પ્રાઈવેટ કી, ડિક્રિપ્શન, પબ્લિક કી, એન્ક્રિપ્શન","(C) DES, એન્ક્રિપ્શન, DES, ડિક્રિપ્શન","(D) ઉપરોક્તમાંથી કોઈ સાચું ક્રમ નથી"], answer:"(A) Private Key, Encryption, Public Key, Decryption"},
      {qEn:"95. What is the correct ordering of attacks on the basis of difficulty level (High to low)", qGu:"95. હુમલાઓનો મુશ્કેલી સ્તરના આધારે સાચો ક્રમ (ઉચ્ચથી નીચું) કયો છે?", optionsEn:["(A) known plaintext, chosen plaintext, chosen cipher text, cipher text only","(B) known plaintext, chosen cipher text, chosen plaintext, cipher text only","(C) cipher text only, known plaintext, chosen plaintext, chosen cipher text.","(D) cipher text only, chosen plaintext, known plaintext, chosen cipher text,"], optionsGu:["(A) known plaintext, chosen plaintext, chosen cipher text, cipher text only","(B) known plaintext, chosen cipher text, chosen plaintext, cipher text only","(C) cipher text only, known plaintext, chosen plaintext, chosen cipher text.","(D) cipher text only, chosen plaintext, known plaintext, chosen cipher text,"], answer:"(C) cipher text only, known plaintext, chosen plaintext, chosen cipher text."},
      {qEn:"96. Which security service is not provided by IPSec", qGu:"96. IPSec દ્વારા કઈ સુરક્ષા સેવા આપવામાં આવતી નથી?", optionsEn:["(A) Access control","(B) Connectionless integrity","(C) Use authentication","(D) Rejection of replayed packets"], optionsGu:["(A) એક્સેસ કંટ્રોલ","(B) કનેક્શનલેસ ઇન્ટિગ્રિટી","(C) યુઝર ઓથેન્ટિકેશન","(D) રીપ્લે પેકેટ્સનું રિજેક્શન"], answer:"(C) Use authentication"},
      {qEn:"97. ............ is a method of attacking a challenge-response authentication system that uses the same protocol in both directions.", qGu:"97. ............ એ ચેલેન્જ-રિસ્પોન્સ ઓથેન્ટિકેશન સિસ્ટમ પર હુમલો કરવાની પદ્ધતિ છે જે બંને દિશામાં સમાન પ્રોટોકોલ વાપરે છે.", optionsEn:["(A) Replay attack","(B) Denial of Service Attack","(C) Masquerading","(D) Reflection Attack"], optionsGu:["(A) રીપ્લે અટેક","(B) ડિનાયલ ઓફ સર્વિસ અટેક","(C) માસ્કરેડિંગ","(D) રિફ્લેક્શન અટેક"], answer:"(D) Reflection Attack"},
      {qEn:"98. Encryption is primarily used to provide security service.", qGu:"98. એન્ક્રિપ્શન મુખ્યત્વે ______ સુરક્ષા સેવા આપવા માટે વપરાય છે.", optionsEn:["(A) Confidentiality","(B) Access Control","(C) Non- repudiation","(D) User Authentication"], optionsGu:["(A) કોન્ફિડેન્શિયાલિટી","(B) એક્સેસ કંટ્રોલ","(C) નોન-રિપ્યુડિયેશન","(D) યુઝર ઓથેન્ટિકેશન"], answer:"(A) Confidentiality"},
      {qEn:"99. An ATM cell has the payload field of", qGu:"99. ATM સેલનું પેલોડ ફિલ્ડ ______ બાઇટ્સનું હોય છે", optionsEn:["(A) 53 bytes","(B) 48 bytes","(C) 64 bytes","(D) 56 bytes"], optionsGu:["(A) 53 બાઇટ્સ","(B) 48 બાઇટ્સ","(C) 64 બાઇટ્સ","(D) 56 બાઇટ્સ"], answer:"(B) 48 bytes"},
      {qEn:"100. Which is not a function of data link layer", qGu:"100. ડેટા લિંક લેયરનું કાર્ય નથી", optionsEn:["(A) Framing","(B) Flow Control","(C) Signal encoding","(D) Error control"], optionsGu:["(A) ફ્રેમિંગ","(B) ફ્લો કંટ્રોલ","(C) સિગ્નલ એન્કોડિંગ","(D) એરર કંટ્રોલ"], answer:"(C) Signal encoding"},
      {qEn:"101. In Manchester Encoding, the data bit is represented by", qGu:"101. મેન્ચેસ્ટર એન્કોડિંગમાં, ડેટા બિટ ______ દ્વારા રજૂ થાય છે", optionsEn:["(A) 0 as high, 1 as low","(B) Both 0 and 1 as transition in the middle of bit period","(C) 0 as transition at the beginning of bit period, 1 as no transition","(D) Both 0 and 1 as No transition in the middle of bit period"], optionsGu:["(A) 0 હાઈ, 1 લો","(B) 0 અને 1 બંને બિટ પીરિયડના મધ્યમાં ટ્રાન્ઝિશન","(C) 0 બિટ પીરિયડની શરૂઆતમાં ટ્રાન્ઝિશન, 1માં કોઈ ટ્રાન્ઝિશન નહીં","(D) 0 અને 1 બંનેમાં મધ્યમાં કોઈ ટ્રાન્ઝિશન નહીં"], answer:"(B) Both 0 and 1 as transition in the middle of bit period"},
      {qEn:"102. In TCP/IP, network layer and transport layer provides.........Services respectively", qGu:"102. TCP/IPમાં, નેટવર્ક લેયર અને ટ્રાન્સપોર્ટ લેયર અનુક્રમે ......... સેવાઓ આપે છે", optionsEn:["(A) Only connectionless, Both Connectionless and Connection Oriented","(B) Both connectionless and Connection Oriented, Only connectionless","(C) Connectionless, Connection Oriented","(D) Connection Oriented, Connectionless"], optionsGu:["(A) ફક્ત કનેક્શનલેસ, બંને કનેક્શનલેસ અને કનેક્શન ઓરિએન્ટેડ","(B) બંને કનેક્શનલેસ અને કનેક્શન ઓરિએન્ટેડ, ફક્ત કનેક્શનલેસ","(C) કનેક્શનલેસ, કનેક્શન ઓરિએન્ટેડ","(D) કનેક્શન ઓરિએન્ટેડ, કનેક્શનલેસ"], answer:"(A) Only connectionless, Both Connectionless and Connection Oriented"},
      {qEn:"103. In.............., the error free frames received following an erroneous frame are buffered and only the oldest unacknowledged frame is retransmitted by the sender.", qGu:"103. ..............માં, ભૂલવાળા ફ્રેમ પછી મળેલા ભૂલ વિનાના ફ્રેમ્સ બફર કરવામાં આવે છે અને માત્ર સૌથી જૂનો અનએક્નોલેજ્ડ ફ્રેમ ફરી મોકલવામાં આવે છે.", optionsEn:["(A) Go Back N","(B) Selective Repeat","(C) One bit Sliding Window Protocol","(D) All the above"], optionsGu:["(A) ગો બેક N","(B) સિલેક્ટિવ રિપીટ","(C) વન બિટ સ્લાઇડિંગ વિન્ડો પ્રોટોકોલ","(D) બધા"], answer:"(B) Selective Repeat"},
      {qEn:"104. A......... is used to interconnect two networks at data link layer", qGu:"104. .........નો ઉપયોગ બે નેટવર્કને ડેટા લિંક લેયર પર જોડવા માટે થાય છે", optionsEn:["(A) Hub","(B) Repeater","(C) Bridge","(D) Router"], optionsGu:["(A) હબ","(B) રિપીટર","(C) બ્રિજ","(D) રાઉટર"], answer:"(C) Bridge"},
      {qEn:"105. In point-to-Point Protocol (PPP), network layer option are negotiated using", qGu:"105. પોઇન્ટ-ટુ-પોઇન્ટ પ્રોટોકોલ (PPP)માં, નેટવર્ક લેયર વિકલ્પો ______ વડે નેગોશિયેટ કરવામાં આવે છે", optionsEn:["(A) Link Control Protocol","(B) Dynamic Host Control Protocol","(C) Internet Protocol","(D) Network Control Protocol"], optionsGu:["(A) લિંક કંટ્રોલ પ્રોટોકોલ","(B) ડાયનેમિક હોસ્ટ કંટ્રોલ પ્રોટોકોલ","(C) ઇન્ટરનેટ પ્રોટોકોલ","(D) નેટવર્ક કંટ્રોલ પ્રોટોકોલ"], answer:"(D) Network Control Protocol"},

let currentMode = 'practice';
let questionLangs = new Array(mcqs.length).fill('en');
let lastScrollTop = 0;

function renderMCQs() {
  const container = document.getElementById('mcqContainer');
  container.innerHTML = '';

  mcqs.forEach((mcq, index) => {
    const qLang = questionLangs[index];
    const qText = qLang === 'en' ? mcq.qEn : mcq.qGu;
    const opts = qLang === 'en' ? mcq.optionsEn : mcq.optionsGu;

    let optionsHTML = opts.map(opt => 
      `<div class="option" onclick="handleClick(this, ${index})">${opt}</div>`
    ).join('');

    container.innerHTML += `
      <div class="mcq-card" id="q${index+1}">
        <div class="question-num">Question ${index + 1}</div>
        
        <div class="lang-toggle">
          <button onclick="changeQuestionLang(${index}, 'en')" class="${qLang==='en'?'active':''}">English</button>
          <button onclick="changeQuestionLang(${index}, 'gu')" class="${qLang==='gu'?'active':''}">Gujarati</button>
        </div>

        <div class="question">${qText}</div>
        <div class="options">${optionsHTML}</div>
        <div class="answer"><strong>Correct Answer: </strong>${mcq.answer}</div>
      </div>`;
  });
}

function changeQuestionLang(index, lang) {
  questionLangs[index] = lang;
  renderMCQs();
}

function handleClick(el, qIndex) {
  const card = el.closest('.mcq-card');
  const options = card.querySelectorAll('.option');
  const correct = mcqs[qIndex].answer;

  if (currentMode === 'practice') {
    options.forEach(opt => {
      if (opt.textContent.trim() === correct) opt.classList.add('correct');
      else if (opt === el) opt.classList.add('wrong');
    });
    card.querySelector('.answer').style.display = 'block';
  } else {
    options.forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
  }
}

function setGlobalLang(lang) {
  questionLangs.fill(lang);
  document.getElementById('globalGu').classList.toggle('active', lang==='gu');
  document.getElementById('globalEn').classList.toggle('active', lang==='en');
  renderMCQs();
}

function goToQuestion() {
  const input = document.getElementById('gotoInput');
  let num = parseInt(input.value);
  if (num >= 1 && num <= mcqs.length) {
    const element = document.getElementById('q' + num);
    if (element) {
      element.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }
  input.value = '';   // clear after jump
}

function filterMCQs() {
  // You can enhance search if needed
  renderMCQs();
}

function submitTest() {
  // Add your scoring logic here (same as previous)
  alert("Test Submitted! Score calculation can be added.");
}

// Header hide/show on scroll
window.addEventListener('scroll', () => {
  const header = document.getElementById('header');
  const st = window.pageYOffset || document.documentElement.scrollTop;
  if (st > lastScrollTop && st > 150) {
    header.classList.add('hidden');
  } else {
    header.classList.remove('hidden');
  }
  lastScrollTop = st <= 0 ? 0 : st;
});

window.onload = () => {
  renderMCQs();
};
</script>

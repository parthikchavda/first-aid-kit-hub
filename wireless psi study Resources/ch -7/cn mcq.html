<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetMaster • Computer Networks MCQ</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Noto+Sans+Gujarati:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e2d47;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #10b981;
  --danger: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --gold: #f59e0b;
  --glow: 0 0 30px rgba(0,212,255,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Syne', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size:50px 50px;
  pointer-events:none;
  z-index:0;
}

/* HEADER */
.header {
  position:fixed; top:0; left:0; right:0; z-index:100;
  background: rgba(10,14,26,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 64px;
  display:flex; align-items:center; justify-content:space-between;
  transition: transform 0.3s ease;
}
.header.hide { transform: translateY(-100%); }

.logo {
  display:flex; align-items:center; gap:10px;
  font-family:'Space Mono', monospace;
  font-size:18px; font-weight:700;
  color: var(--accent);
  letter-spacing:-0.5px;
}
.logo-icon {
  width:34px; height:34px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px;
}

.header-controls { display:flex; align-items:center; gap:12px; }

.goto-wrap {
  display:flex; align-items:center; gap:8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius:8px;
  padding: 6px 12px;
  font-size:13px;
  font-family:'Space Mono',monospace;
  color: var(--muted);
}
.goto-wrap input {
  background:transparent; border:none; outline:none;
  color: var(--accent); width:60px; font-size:13px;
  font-family:'Space Mono',monospace; text-align:center;
}

.lang-toggle {
  display:flex;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
}
.lang-toggle button {
  padding: 7px 14px; border:none; cursor:pointer;
  font-size:12px; font-weight:700; font-family:'Syne',sans-serif;
  background:transparent; color:var(--muted);
  transition:all 0.2s;
  letter-spacing:0.5px;
}
.lang-toggle button.active { background:var(--accent); color:#000; }

/* HERO */
.hero {
  position:relative; z-index:1;
  min-height: 280px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: 100px 24px 40px;
  text-align:center;
  overflow:hidden;
}
.hero-orb {
  position:absolute;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.4;
  pointer-events:none;
}
.orb1 { width:400px; height:400px; background:var(--accent2); top:-100px; left:-100px; }
.orb2 { width:300px; height:300px; background:var(--accent); top:-50px; right:-50px; }

.hero-badge {
  display:inline-flex; align-items:center; gap:6px;
  background: rgba(0,212,255,0.1);
  border: 1px solid rgba(0,212,255,0.3);
  border-radius:20px;
  padding: 5px 14px;
  font-size:12px; color:var(--accent); font-weight:700;
  letter-spacing:2px; text-transform:uppercase;
  margin-bottom:18px;
}
.hero h1 {
  font-size: clamp(2rem, 5vw, 3.8rem);
  font-weight:800;
  line-height:1.1;
  background: linear-gradient(135deg, #fff 30%, var(--accent) 70%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:12px;
}
.hero p { color:var(--muted); font-size:15px; }

/* PART TABS */
.part-tabs {
  position:sticky; top:64px; z-index:90;
  background: rgba(10,14,26,0.95);
  backdrop-filter:blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display:flex; align-items:center; gap:0;
  overflow-x:auto;
  scrollbar-width:none;
}
.part-tabs::-webkit-scrollbar { display:none; }

.part-tab {
  position:relative;
  padding: 16px 28px;
  border:none; background:transparent;
  color: var(--muted); cursor:pointer;
  font-family:'Syne',sans-serif;
  font-size:13px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  white-space:nowrap;
  transition: color 0.2s;
}
.part-tab::after {
  content:'';
  position:absolute; bottom:0; left:0; right:0; height:2px;
  background: var(--accent);
  transform: scaleX(0);
  transition: transform 0.2s;
}
.part-tab.active { color:var(--accent); }
.part-tab.active::after { transform:scaleX(1); }
.part-tab:hover:not(.active) { color: var(--text); }

.tab-badge {
  display:inline-block;
  background: rgba(0,212,255,0.1);
  border: 1px solid rgba(0,212,255,0.2);
  border-radius:10px;
  padding:1px 7px; font-size:10px;
  margin-left:6px; vertical-align:middle;
}
.part-tab.active .tab-badge {
  background: rgba(0,212,255,0.2);
  border-color: rgba(0,212,255,0.5);
}

/* TOOLBAR */
.toolbar {
  position:relative; z-index:1;
  padding: 20px 24px;
  display:flex; align-items:center; gap:12px;
  flex-wrap:wrap;
  max-width:1100px; margin:0 auto;
}
.search-wrap {
  flex:1; min-width:200px;
  position:relative;
}
.search-wrap input {
  width:100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius:10px;
  padding: 12px 16px 12px 42px;
  color: var(--text); font-size:14px;
  font-family:'Syne',sans-serif;
  outline:none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color:var(--muted); }
.search-icon {
  position:absolute; left:14px; top:50%; transform:translateY(-50%);
  color:var(--muted); font-size:16px; pointer-events:none;
}

.mode-btns { display:flex; gap:8px; }
.mode-btn {
  padding: 11px 18px;
  border: 1px solid var(--border);
  border-radius:10px;
  background: var(--surface);
  color: var(--muted);
  font-family:'Syne',sans-serif;
  font-size:12px; font-weight:700;
  letter-spacing:0.5px; text-transform:uppercase;
  cursor:pointer; transition:all 0.2s;
  white-space:nowrap;
}
.mode-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,212,255,0.08);
}

/* PROGRESS BAR */
.progress-wrap {
  position:relative; z-index:1;
  padding: 0 24px 16px;
  max-width:1100px; margin:0 auto;
}
.progress-info {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:8px; font-size:12px; color:var(--muted);
  font-family:'Space Mono',monospace;
}
.progress-bar {
  height:4px; background:var(--surface2); border-radius:2px; overflow:hidden;
}
.progress-fill {
  height:100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius:2px;
  transition: width 0.4s ease;
  width:0%;
}

/* MCQ CONTAINER */
.mcq-container {
  position:relative; z-index:1;
  max-width:1100px; margin:0 auto;
  padding: 0 24px 40px;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
  gap:20px;
}

/* MCQ CARD */
.mcq-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius:16px;
  padding: 24px;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  position:relative;
  overflow:hidden;
}
.mcq-card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity:0;
  transition:opacity 0.3s;
}
.mcq-card:hover { border-color: rgba(0,212,255,0.3); box-shadow: var(--glow); transform:translateY(-2px); }
.mcq-card:hover::before { opacity:1; }
.mcq-card.answered { border-color: rgba(16,185,129,0.3); }
.mcq-card.answered::before { background: linear-gradient(90deg, transparent, var(--accent3), transparent); opacity:1; }

.card-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:14px;
}
.q-num {
  font-family:'Space Mono',monospace;
  font-size:11px; font-weight:700;
  color:var(--accent);
  letter-spacing:1px;
  background: rgba(0,212,255,0.08);
  border: 1px solid rgba(0,212,255,0.2);
  padding:3px 10px; border-radius:20px;
}
.q-status {
  width:8px; height:8px; border-radius:50%;
  background: var(--border);
  transition: background 0.3s;
}
.q-status.correct { background: var(--accent3); box-shadow: 0 0 8px var(--accent3); }
.q-status.wrong { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

.card-lang {
  display:flex; gap:6px; margin-bottom:14px;
}
.card-lang button {
  padding:4px 12px; border-radius:6px;
  border: 1px solid var(--border);
  background:transparent; color:var(--muted);
  font-size:11px; font-weight:700; cursor:pointer;
  font-family:'Syne',sans-serif;
  transition:all 0.2s;
}
.card-lang button.active { background:var(--accent2); border-color:var(--accent2); color:#fff; }

.question-text {
  font-size:14px; font-weight:600; line-height:1.65;
  color: var(--text);
  margin-bottom:18px;
}

.options-grid { display:flex; flex-direction:column; gap:8px; }

.option-btn {
  display:flex; align-items:flex-start; gap:10px;
  padding: 12px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius:10px;
  cursor:pointer; text-align:left; width:100%;
  transition: all 0.2s;
  color: var(--text); font-size:13px;
  font-family:'Syne',sans-serif; line-height:1.5;
}
.option-btn:hover:not(:disabled) {
  border-color: rgba(0,212,255,0.4);
  background: rgba(0,212,255,0.05);
}
.option-btn:disabled { cursor:default; }
.option-btn .opt-label {
  font-family:'Space Mono',monospace;
  font-size:11px; font-weight:700;
  color:var(--muted); min-width:22px;
  flex-shrink:0; margin-top:1px;
}
.option-btn.selected { border-color:var(--accent2); background:rgba(124,58,237,0.12); }
.option-btn.correct { border-color:var(--accent3)!important; background:rgba(16,185,129,0.12)!important; color:var(--accent3)!important; }
.option-btn.correct .opt-label { color:var(--accent3)!important; }
.option-btn.wrong { border-color:var(--danger)!important; background:rgba(239,68,68,0.12)!important; color:var(--danger)!important; }
.option-btn.wrong .opt-label { color:var(--danger)!important; }

.answer-reveal {
  margin-top:14px;
  padding:12px 16px;
  background: rgba(16,185,129,0.08);
  border: 1px solid rgba(16,185,129,0.25);
  border-radius:10px;
  font-size:12px; color:var(--accent3);
  font-family:'Space Mono',monospace;
  display:none;
}
.answer-reveal strong { color:var(--accent3); }

/* FOOTER / SUBMIT */
.test-footer {
  position:relative; z-index:1;
  max-width:1100px; margin:0 auto 60px;
  padding: 0 24px;
  display:none;
}
.submit-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius:16px;
  padding: 28px 32px;
  display:flex; align-items:center; justify-content:space-between;
  gap:20px; flex-wrap:wrap;
}
.submit-info { font-size:14px; color:var(--muted); }
.submit-info strong { color:var(--text); display:block; font-size:22px; margin-bottom:4px; }
.btn-submit {
  padding: 14px 40px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border:none; border-radius:10px;
  color:#000; font-family:'Syne',sans-serif;
  font-size:14px; font-weight:800;
  cursor:pointer; letter-spacing:1px; text-transform:uppercase;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,212,255,0.3); }

/* SCORE MODAL */
.modal-overlay {
  position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,0.8); backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px; padding:40px;
  max-width:480px; width:100%;
  text-align:center;
  transform:scale(0.9); transition:transform 0.3s;
  position:relative;
}
.modal-overlay.show .modal { transform:scale(1); }

.modal-icon { font-size:56px; margin-bottom:16px; }
.modal h2 { font-size:2rem; font-weight:800; margin-bottom:8px; }
.score-big {
  font-size:4rem; font-weight:800;
  font-family:'Space Mono',monospace;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1; margin:16px 0;
}
.score-detail { color:var(--muted); font-size:14px; margin-bottom:24px; }
.score-stats {
  display:grid; grid-template-columns:1fr 1fr;
  gap:12px; margin-bottom:28px;
}
.stat-box {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:12px; padding:16px;
}
.stat-box .val { font-size:1.8rem; font-weight:800; font-family:'Space Mono',monospace; }
.stat-box .lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-top:4px; }
.stat-box.c .val { color:var(--accent3); }
.stat-box.w .val { color:var(--danger); }
.modal-btns { display:flex; gap:12px; justify-content:center; }
.modal-btn {
  padding:12px 28px; border-radius:10px;
  font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; text-transform:uppercase; letter-spacing:1px;
  transition:all 0.2s;
}
.modal-btn.primary { background:var(--accent); border:none; color:#000; }
.modal-btn.secondary { background:transparent; border:1px solid var(--border); color:var(--muted); }
.modal-btn:hover { transform:translateY(-2px); }

/* EMPTY STATE */
.empty-state {
  text-align:center; padding:80px 24px;
  color:var(--muted); grid-column:1/-1;
}
.empty-state .icon { font-size:48px; margin-bottom:12px; }

/* SCROLL TOP */
.scroll-top {
  position:fixed; bottom:28px; right:28px; z-index:200;
  width:46px; height:46px;
  background:var(--accent); border:none; border-radius:50%;
  color:#000; font-size:18px; cursor:pointer;
  box-shadow:0 4px 16px rgba(0,212,255,0.4);
  display:flex; align-items:center; justify-content:center;
  opacity:0; transform:translateY(20px);
  transition:all 0.3s;
}
.scroll-top.show { opacity:1; transform:translateY(0); }

/* TOAST */
.toast {
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:12px 24px;
  font-size:13px; color:var(--text);
  z-index:300; opacity:0;
  transition:all 0.3s; white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (max-width:700px) {
  .mcq-container { grid-template-columns:1fr; padding:0 12px 40px; }
  .hero h1 { font-size:2rem; }
  .header { padding:0 12px; }
  .part-tabs { padding:0 12px; }
  .toolbar { padding:16px 12px; }
  .progress-wrap { padding:0 12px 12px; }
  .submit-row { flex-direction:column; align-items:flex-start; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header" id="header">
  <div class="logo">
    <div class="logo-icon">🌐</div>
    NetMaster
  </div>
  <div class="header-controls">
    <div class="goto-wrap">
      <span>Q:</span>
      <input type="number" id="gotoInput" placeholder="1-291" min="1" max="291"
        onkeydown="if(event.key==='Enter')goTo()">
    </div>
    <div class="lang-toggle">
      <button id="gLangEn" class="active" onclick="setGlobalLang('en')">EN</button>
      <button id="gLangGu" onclick="setGlobalLang('gu')">ગુ</button>
    </div>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-orb orb1"></div>
  <div class="hero-orb orb2"></div>
  <div class="hero-badge">📡 Computer Networks</div>
  <h1>MCQ Master</h1>
  <p id="heroSub">291 Questions • Practice & Test Modes • Bilingual</p>
</div>

<!-- PART TABS -->
<div class="part-tabs" id="partTabs"></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search questions..." oninput="filterCards()">
  </div>
  <div class="mode-btns">
    <button class="mode-btn active" id="btnPractice" onclick="setMode('practice')">⚡ Practice</button>
    <button class="mode-btn" id="btnTest" onclick="setMode('test')">📝 Test Mode</button>
  </div>
</div>

<!-- PROGRESS -->
<div class="progress-wrap" id="progressWrap" style="display:none">
  <div class="progress-info">
    <span id="progressText">0 / 0 answered</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<!-- MCQ GRID -->
<div class="mcq-container" id="mcqContainer"></div>

<!-- SUBMIT FOOTER -->
<div class="test-footer" id="testFooter">
  <div class="submit-row">
    <div class="submit-info">
      <strong id="answeredCount">0 / 0</strong>
      Questions answered in this part
    </div>
    <button class="btn-submit" onclick="submitTest()">Submit &amp; Score →</button>
  </div>
</div>

<!-- SCORE MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-icon" id="modalIcon">🎯</div>
    <h2 id="modalTitle">Results</h2>
    <div class="score-big" id="scorePct">0%</div>
    <div class="score-detail" id="scoreDetail"></div>
    <div class="score-stats">
      <div class="stat-box c"><div class="val" id="statCorrect">0</div><div class="lbl">Correct</div></div>
      <div class="stat-box w"><div class="val" id="statWrong">0</div><div class="lbl">Wrong</div></div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn primary" onclick="closeModal()">Review Answers</button>
      <button class="modal-btn secondary" onclick="resetPart()">Try Again</button>
    </div>
  </div>
</div>

<!-- SCROLL TOP -->
<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== ALL MCQs =====
const ALL_MCQS = [
  {qEn:"1. The portion of physical layer that interfaces with the media access control sublayer is called ______",qGu:"1. ફિઝિકલ લેયરનો તે ભાગ જે MAC સબલેયર સાથે ઇન્ટરફેસ કરે છે તેને ______ કહેવામાં આવે છે",opts:["(A) physical signaling sublayer","(B) physical data sublayer","(C) physical address sublayer","(D) physical transport sublayer"],optsGu:["(A) ફિઝિકલ સિગ્નલિંગ સબલેયર","(B) ફિઝિકલ ડેટા સબલેયર","(C) ફિઝિકલ એડ્રેસ સબલેયર","(D) ફિઝિકલ ટ્રાન્સપોર્ટ સબલેયર"],ans:"(A) physical signaling sublayer"},
  {qEn:"2. What is routing algorithm used by OSPF routing protocol?",qGu:"2. OSPF રાઉટિંગ પ્રોટોકોલ દ્વારા કયો રાઉટિંગ અલ્ગોરિધમ વપરાય છે?",opts:["(A) Distance vector","(B) Flooding","(C) Path vector","(D) Link state"],optsGu:["(A) ડિસ્ટન્સ વેક્ટર","(B) ફ્લડિંગ","(C) પાથ વેક્ટર","(D) લિંક સ્ટેટ"],ans:"(D) Link state"},

// ===== STATE =====
const PART_SIZE = 100;
const TOTAL = ALL_MCQS.length;
const PARTS = Math.ceil(TOTAL / PART_SIZE);

let currentPart = 0;
let globalLang = 'en';
let mode = 'practice';
let answers = new Array(TOTAL).fill(null); // null | 'correct' | 'wrong'
let selectedOpts = new Array(TOTAL).fill(null);
let cardLangs = new Array(TOTAL).fill('en');
let searchText = '';

// ===== INIT =====
function init() {
  buildPartTabs();
  renderPart(0);
  updateProgress();

  window.addEventListener('scroll', onScroll);
  let lastScroll = 0;
  function onScroll() {
    const st = window.scrollY;
    const header = document.getElementById('header');
    if (st > lastScroll && st > 100) header.classList.add('hide');
    else header.classList.remove('hide');
    lastScroll = st <= 0 ? 0 : st;
    document.getElementById('scrollTop').classList.toggle('show', st > 400);
  }
}

function buildPartTabs() {
  const container = document.getElementById('partTabs');
  container.innerHTML = '';
  for (let p = 0; p < PARTS; p++) {
    const start = p * PART_SIZE + 1;
    const end = Math.min((p + 1) * PART_SIZE, TOTAL);
    const btn = document.createElement('button');
    btn.className = 'part-tab' + (p === 0 ? ' active' : '');
    btn.innerHTML = `Part ${p + 1} <span class="tab-badge">${start}–${end}</span>`;
    btn.onclick = () => switchPart(p);
    container.appendChild(btn);
  }
}

function switchPart(p) {
  currentPart = p;
  document.querySelectorAll('.part-tab').forEach((t, i) => t.classList.toggle('active', i === p));
  searchText = '';
  document.getElementById('searchInput').value = '';
  renderPart(p);
  updateProgress();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => {
    document.querySelector('.part-tabs').scrollTo({
      left: document.querySelectorAll('.part-tab')[p].offsetLeft - 60,
      behavior: 'smooth'
    });
  }, 100);
}

function getPartMCQs() {
  const start = currentPart * PART_SIZE;
  const end = Math.min(start + PART_SIZE, TOTAL);
  return ALL_MCQS.slice(start, end).map((q, localIdx) => ({
    ...q, globalIdx: start + localIdx, localIdx
  }));
}

function renderPart(p) {
  const container = document.getElementById('mcqContainer');
  container.innerHTML = '';
  const partMCQs = getPartMCQs();
  const filtered = partMCQs.filter(q => {
    if (!searchText) return true;
    const s = searchText.toLowerCase();
    return q.qEn.toLowerCase().includes(s) ||
      (q.qGu && q.qGu.toLowerCase().includes(s)) ||
      q.opts.some(o => o.toLowerCase().includes(s));
  });

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🔍</div>No questions match your search.</div>`;
    return;
  }

  filtered.forEach(q => {
    const gi = q.globalIdx;
    const lang = cardLangs[gi];
    const question = lang === 'gu' && q.qGu ? q.qGu : q.qEn;
    const opts = (lang === 'gu' && q.optsGu) ? q.optsGu : q.opts;
    const isAnswered = answers[gi] !== null;
    const globalNum = gi + 1;

    let optBtns = opts.map((opt, oi) => {
      let cls = 'option-btn';
      if (mode === 'practice' && isAnswered) {
        if (opt === q.ans) cls += ' correct';
        else if (oi === selectedOpts[gi] && opt !== q.ans) cls += ' wrong';
      } else if (mode === 'test') {
        if (oi === selectedOpts[gi]) cls += ' selected';
      }
      const disabled = (mode === 'practice' && isAnswered) || (mode === 'test' && isAnswered) ? 'disabled' : '';
      const label = opt.substring(0, 3);
      const text = opt.substring(3);
      return `<button class="${cls}" ${disabled} onclick="handleAnswer(${gi},${oi},'${escQ(opt)}')">
        <span class="opt-label">${label}</span>${text}
      </button>`;
    }).join('');

    const ansReveal = mode === 'practice' && isAnswered
      ? `<div class="answer-reveal" style="display:block"><strong>✓ Correct:</strong> ${q.ans}</div>` : '';

    const statusCls = answers[gi] === 'correct' ? 'correct' : answers[gi] === 'wrong' ? 'wrong' : '';
    const answeredCls = isAnswered ? ' answered' : '';

    container.innerHTML += `
      <div class="mcq-card${answeredCls}" id="qcard-${gi}">
        <div class="card-header">
          <span class="q-num">Q ${globalNum}</span>
          <div class="q-status ${statusCls}"></div>
        </div>
        <div class="card-lang">
          <button class="${lang==='en'?'active':''}" onclick="setCardLang(${gi},'en')">EN</button>
          <button class="${lang==='gu'?'active':''}" onclick="setCardLang(${gi},'gu')">ગુ</button>
        </div>
        <div class="question-text">${question}</div>
        <div class="options-grid">${optBtns}</div>
        ${ansReveal}
      </div>`;
  });

  updateFooter();
}

function escQ(s) { return s.replace(/'/g, "\\'"); }

function handleAnswer(gi, optIdx, optText) {
  if (answers[gi] !== null) return;
  selectedOpts[gi] = optIdx;
  const q = ALL_MCQS[gi];
  answers[gi] = optText === q.ans ? 'correct' : 'wrong';
  if (mode === 'practice') {
    renderPart(currentPart);
    updateProgress();
    showToast(answers[gi] === 'correct' ? '✓ Correct!' : '✗ Wrong!');
  } else {
    // just re-render to show selection
    renderPart(currentPart);
    updateFooter();
  }
}

function setCardLang(gi, lang) {
  cardLangs[gi] = lang;
  renderPart(currentPart);
}

function setGlobalLang(lang) {
  globalLang = lang;
  const start = currentPart * PART_SIZE;
  const end = Math.min(start + PART_SIZE, TOTAL);
  for (let i = start; i < end; i++) cardLangs[i] = lang;
  document.getElementById('gLangEn').classList.toggle('active', lang === 'en');
  document.getElementById('gLangGu').classList.toggle('active', lang === 'gu');
  renderPart(currentPart);
}

function setMode(m) {
  mode = m;
  document.getElementById('btnPractice').classList.toggle('active', m === 'practice');
  document.getElementById('btnTest').classList.toggle('active', m === 'test');
  const start = currentPart * PART_SIZE;
  const end = Math.min(start + PART_SIZE, TOTAL);
  for (let i = start; i < end; i++) { answers[i] = null; selectedOpts[i] = null; }
  renderPart(currentPart);
  updateProgress();
  updateFooter();
}

function filterCards() {
  searchText = document.getElementById('searchInput').value;
  renderPart(currentPart);
}

function updateProgress() {
  const start = currentPart * PART_SIZE;
  const end = Math.min(start + PART_SIZE, TOTAL);
  let answered = 0;
  for (let i = start; i < end; i++) if (answers[i] !== null) answered++;
  const total = end - start;
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;

  const wrap = document.getElementById('progressWrap');
  if (mode === 'practice') {
    wrap.style.display = 'block';
    document.getElementById('progressText').textContent = `${answered} / ${total} answered`;
    document.getElementById('progressPct').textContent = `${pct}%`;
    document.getElementById('progressFill').style.width = pct + '%';
  } else {
    wrap.style.display = 'none';
  }
}

function updateFooter() {
  const footer = document.getElementById('testFooter');
  const ac = document.getElementById('answeredCount');
  if (mode === 'test') {
    footer.style.display = 'block';
    const start = currentPart * PART_SIZE;
    const end = Math.min(start + PART_SIZE, TOTAL);
    let sel = 0;
    for (let i = start; i < end; i++) if (selectedOpts[i] !== null) sel++;
    ac.textContent = `${sel} / ${end - start}`;
  } else {
    footer.style.display = 'none';
  }
}

function submitTest() {
  const start = currentPart * PART_SIZE;
  const end = Math.min(start + PART_SIZE, TOTAL);
  let correct = 0, wrong = 0, unanswered = 0;

  for (let i = start; i < end; i++) {
    if (selectedOpts[i] === null) { unanswered++; continue; }
    const q = ALL_MCQS[i];
    if (q.opts[selectedOpts[i]] === q.ans) { correct++; answers[i] = 'correct'; }
    else { wrong++; answers[i] = 'wrong'; }
  }

  const total = end - start - unanswered + 0;
  const attempted = end - start - unanswered;
  const pct = attempted > 0 ? Math.round((correct / (end - start)) * 100) : 0;

  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('scoreDetail').textContent =
    `${correct} correct out of ${end - start} questions (${unanswered} unanswered)`;

  const icon = pct >= 80 ? '🎉' : pct >= 60 ? '👍' : pct >= 40 ? '📚' : '💪';
  const title = pct >= 80 ? 'Excellent!' : pct >= 60 ? 'Good Job!' : pct >= 40 ? 'Keep Studying' : 'Keep Practicing!';
  document.getElementById('modalIcon').textContent = icon;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalOverlay').classList.add('show');

  renderPart(currentPart);
  updateProgress();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  mode = 'practice';
  document.getElementById('btnPractice').classList.add('active');
  document.getElementById('btnTest').classList.remove('active');
  document.getElementById('testFooter').style.display = 'none';
  updateProgress();
}

function resetPart() {
  document.getElementById('modalOverlay').classList.remove('show');
  const start = currentPart * PART_SIZE;
  const end = Math.min(start + PART_SIZE, TOTAL);
  for (let i = start; i < end; i++) { answers[i] = null; selectedOpts[i] = null; }
  renderPart(currentPart);
  updateFooter();
  updateProgress();
}

function goTo() {
  const num = parseInt(document.getElementById('gotoInput').value);
  if (num >= 1 && num <= TOTAL) {
    const partIdx = Math.floor((num - 1) / PART_SIZE);
    if (partIdx !== currentPart) switchPart(partIdx);
    setTimeout(() => {
      const card = document.getElementById('qcard-' + (num - 1));
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 400);
  }
  document.getElementById('gotoInput').value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

document.getElementById('gotoInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') goTo();
});

window.onload = init;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Security MCQ | નેટવર્ક સિક્યુરિટી MCQ</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Rajdhani:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3a55;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --success: #10b981;
    --error: #ef4444;
    --warning: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }
  /* Header */
  .header {
    background: linear-gradient(135deg, #0d1b2a 0%, #1a0533 50%, #0a1628 100%);
    border-bottom: 2px solid var(--accent);
    padding: 20px 24px;
    text-align: center;
    position: sticky;
    /* top: 0; */
    z-index: 100;
    box-shadow: 0 4px 30px rgba(0,212,255,0.15);
  }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(18px, 4vw, 28px);
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .header p { color: var(--muted); font-size: 14px; margin-top: 4px; }
  .lang-toggle {
    display: inline-flex;
    background: var(--border);
    border-radius: 30px;
    padding: 4px;
    margin-top: 12px;
    gap: 2px;
  }
  .lang-btn {
    padding: 6px 18px;
    border: none;
    border-radius: 24px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.3s;
    color: var(--muted);
    background: transparent;
    letter-spacing: 1px;
  }
  .lang-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 2px 12px rgba(0,212,255,0.4);
  }
  /* Category tabs */
  .cat-tabs {
    display: flex;
    gap: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .cat-tabs::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0;
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .cat-btn.active, .cat-btn:hover {
    background: var(--accent2);
    color: white;
    border-color: var(--accent2);
  }
  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: space-around;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }
  .stat {
    text-align: center;
  }
  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
  }
  .stat-val.correct { color: var(--success); }
  .stat-val.wrong { color: var(--error); }
  .stat-val.total { color: var(--accent); }
  .stat-val.score { color: var(--warning); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  /* Main content */
  .content {
    max-width: 860px;
    margin: 0 auto;
    padding: 20px 16px 60px;
  }
  /* Question card */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px;
    margin-bottom: 16px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--border);
    border-radius: 4px 0 0 4px;
    transition: all 0.3s;
  }
  .q-card.answered-correct::before { background: var(--success); }
  .q-card.answered-wrong::before { background: var(--error); }
  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .q-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(124,58,237,0.2);
    color: var(--accent2);
    border: 1px solid rgba(124,58,237,0.3);
  }
  .q-text {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.6;
    margin-bottom: 16px;
    color: var(--white);
  }
  .q-text-gu {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 15px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 400;
    line-height: 1.8;
  }
  /* Options */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 540px) {
    .options { grid-template-columns: 1fr; }
  }
  .opt-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    text-align: left;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) {
    background: rgba(0,212,255,0.08);
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .opt-key {
    flex-shrink: 0;
    width: 26px; height: 26px;
    border-radius: 8px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }
  .opt-btn.correct {
    background: rgba(16,185,129,0.15);
    border-color: var(--success);
    color: var(--success);
  }
  .opt-btn.correct .opt-key { background: var(--success); color: white; }
  .opt-btn.wrong {
    background: rgba(239,68,68,0.15);
    border-color: var(--error);
    color: var(--error);
  }
  .opt-btn.wrong .opt-key { background: var(--error); color: white; }
  .opt-btn.reveal-correct {
    background: rgba(16,185,129,0.08);
    border-color: rgba(16,185,129,0.4);
    color: var(--success);
  }
  .opt-btn:disabled { cursor: default; }
  .opt-text-gu {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: 12px;
    color: var(--muted);
    display: block;
    font-weight: 400;
  }
  /* Result badge */
  .result-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
  }
  .result-badge.correct {
    background: rgba(16,185,129,0.12);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--success);
  }
  .result-badge.wrong {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: var(--error);
  }
  /* Reset button */
  .reset-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 12px 22px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 30px;
    color: white;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
    transition: all 0.3s;
    z-index: 50;
  }
  .reset-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(124,58,237,0.5); }
  /* Hidden */
  .hidden { display: none !important; }
  /* Section heading */
  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 20px 0 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }
</style>
</head>

  <div class="lang-toggle">

let lang = 'en';
let currentCat = 'all';
let answers = {};

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('btn-gu').classList.toggle('active', l==='gu');
  document.getElementById('btn-both').classList.toggle('active', l==='both');
  renderMCQs();
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderMCQs();
}

function getFiltered() {
  if (currentCat === 'all') return mcqs;
  return mcqs.filter(q => q.cat === currentCat);
}

function renderMCQs() {
  const container = document.getElementById('mcq-container');
  const filtered = getFiltered();
  document.getElementById('stat-total').textContent = filtered.length;
  
  // Category groupings for section headings
  const cats = {
    principles: "Security Principles | સુ-ર-ક-્ષ-ા સ-િ-દ-્ધ-ા-ં-ત (Q1-43)",
    system: "System Security Attacks | સ-િ-સ-્ટ-મ સ-ુ-ર-ક-્ષ-ા (Q44-69)",
    modular: "Modular Arithmetic | મ-ો-ડ-્ય-ૂ-લ-ર ગ-ણ-િ-ત (Q70-96)",
    symmetric: "Symmetric Encryption | સ-િ-મ-ે-ટ-્ર-િ-ક (Q97-115)",
    asymmetric: "Asymmetric / PKI | અ-સ-િ-મ-ે-ટ-્ર-િ-ક (Q116-140)",
    os: "OS Security | ઓ-એ-સ-ઃ સ-ુ-ર-ક-્ષ-ા (Q141-165)"
  };
  
  let html = '';
  let prevCat = null;
  
  filtered.forEach((q, idx) => {
    if (currentCat === 'all' && q.cat !== prevCat) {
      html += `<div class="section-title">${cats[q.cat] || q.cat}</div>`;
      prevCat = q.cat;
    }
    const state = answers[q.id];
    const cardClass = state ? (state === q.ans ? 'answered-correct' : 'answered-wrong') : '';
    
    html += `<div class="q-card ${cardClass}" id="card-${q.id}">`;
    html += `<div class="q-num">Q${q.id} <span class="q-badge">${q.cat.toUpperCase()}</span></div>`;
    
    // Question text
    if (lang === 'gu') {
      html += `<div class="q-text" style="font-family:'Tiro Devanagari Hindi',serif;font-size:15px;">${cleanGu(q.gu)}</div>`;
    } else if (lang === 'both') {
      html += `<div class="q-text">${q.en}</div><div class="q-text-gu">${cleanGu(q.gu)}</div>`;
    } else {
      html += `<div class="q-text">${q.en}</div>`;
    }
    
    // Options
    html += '<div class="options">';
    q.opts.forEach(opt => {
      let cls = '';
      if (state) {
        if (opt.k === q.ans) cls = 'correct';
        else if (opt.k === state && state !== q.ans) cls = 'wrong';
      }
      const dis = state ? 'disabled' : '';
      
      let optLabel = '';
      if (lang === 'gu') {
        optLabel = `<span style="font-family:'Tiro Devanagari Hindi',serif;">${cleanGu(opt.gu)}</span>`;
      } else if (lang === 'both') {
        optLabel = `${opt.en}<br><span class="opt-text-gu">${cleanGu(opt.gu)}</span>`;
      } else {
        optLabel = opt.en;
      }
      
      html += `<button class="opt-btn ${cls}" ${dis} onclick="selectAnswer(${q.id},'${opt.k}')">
        <span class="opt-key">${opt.k}</span>
        <span>${optLabel}</span>
      </button>`;
    });
    html += '</div>';
    
    // Result badge
    if (state) {
      const isCorrect = state === q.ans;
      const correctOpt = q.opts.find(o => o.k === q.ans);
      if (isCorrect) {
        html += `<div class="result-badge correct">✅ ${lang==='gu'?'સ-ા-ચ-ો જ-વ-ા-બ!':'Correct!'}</div>`;
      } else {
        const cLabel = lang==='gu' ? cleanGu(correctOpt.gu) : correctOpt.en;
        html += `<div class="result-badge wrong">❌ ${lang==='gu'?'ખ-ો-ટ-ો! સ-ા-ચ-ો:':'Wrong! Correct:'} (${q.ans}) ${cLabel}</div>`;
      }
    }
    
    html += '</div>';
  });
  
  container.innerHTML = html;
  updateStats();
}

function cleanGu(text) {
  // Remove excessive dashes used as placeholder
  if (!text) return '';
  return text.replace(/-/g, '');
}

function selectAnswer(qId, key) {
  if (answers[qId]) return;
  answers[qId] = key;
  
  const q = mcqs.find(m => m.id === qId);
  const card = document.getElementById('card-' + qId);
  
  // Apply styles
  const isCorrect = key === q.ans;
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  
  const buttons = card.querySelectorAll('.opt-btn');
  buttons.forEach(btn => {
    btn.disabled = true;
    const bKey = btn.querySelector('.opt-key').textContent;
    if (bKey === q.ans) btn.classList.add('correct');
    else if (bKey === key && !isCorrect) btn.classList.add('wrong');
  });
  
  // Show result
  const correctOpt = q.opts.find(o => o.k === q.ans);
  const rb = document.createElement('div');
  rb.className = 'result-badge ' + (isCorrect ? 'correct' : 'wrong');
  
  if (isCorrect) {
    rb.innerHTML = lang==='gu' ? '✅ સ-ા-ચ-ો જ-વ-ા-બ! ઉ-ત-્-ત-મ!' : '✅ Correct! Excellent!';
  } else {
    const cLabel = lang==='gu' ? cleanGu(correctOpt.gu) : correctOpt.en;
    rb.innerHTML = lang==='gu' ? `❌ ખ-ો-ટ-ો! સ-ા-ચ-ો: (${q.ans}) ${cLabel}` : `❌ Wrong! Correct Answer: (${q.ans}) ${cLabel}`;
  }
  rb.innerHTML = rb.innerHTML.replace(/-/g,'');
  card.appendChild(rb);
  
  updateStats();
  
  // Auto scroll to next unanswered
  // if (isCorrect) {
  //   setTimeout(() => {
  //     const filtered = getFiltered();
  //     const nextQ = filtered.find(m => !answers[m.id] && m.id !== qId);
  //     if (nextQ) {
  //       const nextCard = document.getElementById('card-' + nextQ.id);
  //       if (nextCard) {
  //         nextCard.scrollIntoView({behavior:'smooth', block:'center'});
  //       }
  //     }
  //   }, 800);
  // }
}

function updateStats() {
  const filtered = getFiltered();
  const filteredIds = filtered.map(q => q.id);
  const attempted = filteredIds.filter(id => answers[id]).length;
  const correct = filteredIds.filter(id => {
    const q = mcqs.find(m => m.id === id);
    return answers[id] === q?.ans;
  }).length;
  const wrong = attempted - correct;
  const score = attempted > 0 ? Math.round(correct/attempted*100) : 0;
  
  document.getElementById('stat-attempted').textContent = attempted;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-score').textContent = score + '%';
}

function resetAll() {
  answers = {};
  renderMCQs();
}

<!DOCTYPE html>
<html lang="gu">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Aid Complete Course - Conductor Exam</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
        rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0b5e7c;
            --primary-light: #1782a8;
            --primary-dark: #073a4f;
            --primary-bg: #e8f4f8;
            --accent: #e67e22;
            --accent-light: #f39c12;
            --text: #1e293b;
            --text-light: #475569;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --radius: 14px;
            --transition: 0.3s ease;
            --sidebar-width: 300px;
            --header-height: 64px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        ul,
        ol {
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 0.4rem;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 8px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* ===== HEADER ===== */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-height);
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.5rem;
            z-index: 1000;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 1px 8px rgba(0, 0, 0, 0.04);
        }

        .app-header .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--primary);
        }

        .app-header .logo span {
            background: var(--primary);
            color: #fff;
            padding: 0.15rem 0.6rem;
            border-radius: 6px;
            font-size: 0.7rem;
            letter-spacing: 0.5px;
        }

        .app-header .logo .icon {
            font-size: 1.5rem;
        }

        /* ===== SEARCH CONTAINER & RESULTS DROPDOWN ===== */
        .search-container {
            position: relative;
            display: inline-block;
        }

        .search-results {
            position: absolute;
            top: calc(100% + 6px);
            /* left: 0; */
            right: 0;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            max-height: 60vh;            /* ← changed to use viewport height */
            overflow-y: auto;            /* ensure scrolling */
            z-index: 1100;
            display: none;
            min-width: 280px;
            padding: 0.3rem 0;
        }

        .search-results.visible {
            display: block;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.6rem 1rem;
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 1px solid var(--bg);
            font-size: 0.85rem;
        }

        .search-result-item:last-child {
            border-bottom: none;
        }

        .search-result-item:hover,
        .search-result-item:focus {
            background: var(--primary-bg);
            color: var(--primary);
        }

        .search-result-item .result-part {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.7rem;
            background: var(--primary-bg);
            padding: 0.1rem 0.6rem;
            border-radius: 12px;
            white-space: nowrap;
        }

        .search-result-item .result-title {
            font-weight: 500;
            flex: 1;
        }

        .search-result-item .result-match {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .search-results .no-result {
            padding: 1rem;
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        /* ===== SEARCH ===== */
        .search-wrapper {
            display: flex;
            align-items: center;
            background: var(--bg);
            border-radius: 30px;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .search-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(11, 94, 124, 0.15);
        }

        .search-wrapper input {
            border: none;
            background: transparent;
            padding: 0.4rem 0.2rem;
            font-size: 0.85rem;
            width: 150px;
            outline: none;
            font-family: var(--font);
            color: var(--text);
        }

        .search-wrapper input::placeholder {
            color: var(--text-light);
            font-size: 0.75rem;
        }

        .search-wrapper button {
            background: var(--primary);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-wrapper button:hover {
            background: var(--primary-dark);
            transform: scale(1.05);
        }

        /* highlight matches */
        .highlight {
            background: #f1c40f;
            padding: 0.1rem 0.2rem;
            border-radius: 3px;
            font-weight: 600;
        }

        .topic-card.search-match {
            border: 3px solid #f1c40f;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.25);
        }

        .header-actions .badge {
            background: var(--primary-bg);
            color: var(--primary);
            padding: 0.2rem 0.9rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text);
            padding: 0.2rem;
            border-radius: 8px;
            transition: var(--transition);
        }

        .menu-toggle:hover {
            background: var(--bg);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: var(--header-height);
            left: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--card);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1.2rem 0.8rem 2rem;
            z-index: 999;
            transition: transform var(--transition);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar .nav-section {
            margin-bottom: 0.6rem;
        }

        .sidebar .nav-section-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-light);
            font-weight: 600;
            padding: 0.6rem 0.8rem 0.3rem;
        }

        .sidebar .nav-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.5rem 0.8rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .sidebar .nav-item:hover {
            background: var(--primary-bg);
            color: var(--primary);
        }

        .sidebar .nav-item.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 12px rgba(11, 94, 124, 0.25);
        }

        .sidebar .nav-item .num {
            font-weight: 600;
            font-size: 0.7rem;
            opacity: 0.6;
            min-width: 22px;
        }

        .sidebar .nav-item.active .num {
            opacity: 1;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            margin-left: var(--sidebar-width);
            margin-top: var(--header-height);
            padding: 2rem 2.5rem 4rem;
            flex: 1;
            max-width: 1100px;
        }

        /* ===== TOPIC CARD ===== */
        .topic-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem 2.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border);
            transition: var(--transition);
        }

        .topic-card:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.07);
        }

        .topic-card .part-badge {
            display: inline-block;
            background: var(--primary-bg);
            color: var(--primary);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.15rem 0.9rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 0.8rem;
        }

        .topic-card h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--primary-dark);
            margin-bottom: 0.4rem;
            line-height: 1.2;
        }

        .topic-card .subhead {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary-light);
            padding-left: 1rem;
        }

        .topic-card h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin: 1.8rem 0 0.8rem;
            padding-bottom: 0.3rem;
            border-bottom: 2px solid var(--primary-bg);
        }

        .topic-card h3 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--primary);
            margin: 1.2rem 0 0.5rem;
        }

        .topic-card h4 {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
            margin: 1rem 0 0.3rem;
        }

        .topic-card p {
            margin-bottom: 0.8rem;
            color: var(--text);
        }

        .topic-card ul,
        .topic-card ol {
            margin-bottom: 0.8rem;
        }

        /* ===== TABLES ===== */
        .table-wrap {
            overflow-x: auto;
            margin: 1rem 0 1.5rem;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .table-wrap table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            min-width: 480px;
        }

        .table-wrap th {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            padding: 0.7rem 1rem;
            text-align: left;
        }

        .table-wrap td {
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .table-wrap tr:last-child td {
            border-bottom: none;
        }

        .table-wrap tr:nth-child(even) td {
            background: var(--bg);
        }

        /* ===== BOXES ===== */
        .box-tip,
        .box-warning,
        .box-important,
        .box-example {
            padding: 1rem 1.4rem;
            border-radius: 10px;
            margin: 1rem 0;
            border-left: 5px solid;
        }

        .box-tip {
            background: #eafaf1;
            border-color: #27ae60;
        }

        .box-warning {
            background: #fef9e7;
            border-color: #f39c12;
        }

        .box-important {
            background: #eaf2f8;
            border-color: #2980b9;
        }

        .box-example {
            background: #fdf2e9;
            border-color: #e67e22;
        }

        .box-tip strong,
        .box-warning strong,
        .box-important strong,
        .box-example strong {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.2rem;
        }

        .box-tip strong {
            color: #1a7a3a;
        }

        .box-warning strong {
            color: #b7950b;
        }

        .box-important strong {
            color: #1a5276;
        }

        .box-example strong {
            color: #b9770e;
        }

        /* ===== MCQ ===== */
        .mcq-block {
            margin: 1.2rem 0;
            padding: 1.2rem 1.5rem;
            background: var(--bg);
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .mcq-block .q {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .mcq-block .opts {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            padding-left: 0.5rem;
        }

        .mcq-block .opts label {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.92rem;
        }

        .mcq-block .opts label:hover {
            background: var(--primary-bg);
        }

        .mcq-block .opts input[type="radio"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .mcq-block .reveal-btn {
            margin-top: 0.8rem;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0.4rem 1.2rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .mcq-block .reveal-btn:hover {
            background: var(--primary-dark);
        }

        .mcq-block .answer {
            margin-top: 0.8rem;
            padding: 0.6rem 1rem;
            background: #d5f5e3;
            border-radius: 8px;
            font-weight: 600;
            color: #1a7a3a;
            display: none;
        }

        .mcq-block .answer.show {
            display: block;
        }

        /* ===== DO / DON'T ===== */
        .do-dont {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            margin: 1rem 0;
        }

        .do-dont .col {
            padding: 1rem 1.2rem;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .do-dont .col.do {
            background: #eafaf1;
            border-color: #27ae60;
        }

        .do-dont .col.dont {
            background: #fdedec;
            border-color: #e74c3c;
        }

        .do-dont .col h4 {
            margin-top: 0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .do-dont .col ul {
            margin: 0.3rem 0 0;
            padding-left: 1.2rem;
        }

        .do-dont .col ul li {
            margin-bottom: 0.2rem;
            font-size: 0.9rem;
        }

        /* ===== MNEMONIC ===== */
        .mnemonic {
            background: linear-gradient(135deg, #fef9e7, #fdebd0);
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            border: 1px solid #f9e79f;
            margin: 0.8rem 0;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-block;
            width: auto;
        }

        @media (max-width: 820px) {
            .search-wrapper input {
                width: 100px;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .search-wrapper input {
                width: 70px;
                font-size: 0.7rem;
            }

            .search-wrapper {
                padding: 0.1rem 0.1rem 0.1rem 0.6rem;
            }

            .search-wrapper button {
                width: 26px;
                height: 26px;
                font-size: 0.7rem;
            }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) {
            .main-content {
                padding: 1.5rem;
            }

            .topic-card {
                padding: 1.5rem;
            }

            .do-dont {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 820px) {
            :root {
                --sidebar-width: 280px;
            }

            .menu-toggle {
                display: block;
            }

            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
                box-shadow: 4px 0 30px rgba(0, 0, 0, 0.1);
            }

            .main-content {
                margin-left: 0;
                padding: 1.2rem;
            }

            .app-header .badge {
                display: none;
            }

            .topic-card h1 {
                font-size: 1.5rem;
            }

            .topic-card {
                padding: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .app-header {
                padding: 0 1rem;
            }

            .app-header .logo {
                font-size: 0.9rem;
            }

            .app-header .logo .icon {
                font-size: 1.2rem;
            }

            .main-content {
                padding: 0.8rem;
            }

            .topic-card {
                padding: 1rem;
                border-radius: 10px;
            }

            .topic-card h1 {
                font-size: 1.2rem;
            }

            .topic-card .subhead {
                font-size: 0.9rem;
                padding-left: 0.7rem;
            }

            .table-wrap table {
                font-size: 0.8rem;
                min-width: 360px;
            }

            .table-wrap th,
            .table-wrap td {
                padding: 0.4rem 0.6rem;
            }

            .mcq-block {
                padding: 0.8rem 1rem;
            }

            .do-dont .col {
                padding: 0.8rem;
            }

            .box-tip,
            .box-warning,
            .box-important,
            .box-example {
                padding: 0.8rem 1rem;
            }

            .sidebar {
                width: 100%;
                max-width: 320px;
            }
        }

        /* ===== PRINT ===== */
        @media print {

            .sidebar,
            .app-header,
            .menu-toggle,
            .mcq-block .reveal-btn {
                display: none !important;
            }

            .main-content {
                margin-left: 0 !important;
                margin-top: 0 !important;
                padding: 0.5in !important;
                max-width: 100% !important;
            }

            .topic-card {
                box-shadow: none !important;
                border: 1px solid #ddd !important;
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .mcq-block .answer {
                display: block !important;
                background: #f0f0f0 !important;
            }

            .table-wrap {
                border: 1px solid #ccc !important;
            }

            .do-dont .col {
                border: 1px solid #ccc !important;
            }

            body {
                background: #fff !important;
            }
        }

        /* ===== UTILITY ===== */
        .mt-0 {
            margin-top: 0;
        }

        .mb-0 {
            margin-bottom: 0;
        }

        .text-center {
            text-align: center;
        }

        .text-small {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .gap-1 {
            gap: 0.5rem;
        }

        .flex {
            display: flex;
            align-items: center;
        }

        /* Smooth section reveal */
        .topic-card {
            opacity: 0;
            transform: translateY(12px);
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* scroll margin for anchor */
        .topic-card[id] {
            scroll-margin-top: calc(var(--header-height) + 16px);
        }
    </style>
</head>

<body>

    <!-- ===== HEADER ===== -->
    <header class="app-header">
        <div class="logo">
            <span class="icon">🩺</span>
            FirstAid<span>Course</span>
        </div>
        <div class="header-actions">
            <span class="badge">Conductor Exam</span>
            <!-- +++ NEW: Search bar +++ -->
            <div class="search-container">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Search topics..." />
                    <button id="searchBtn" aria-label="Search">🔍</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
        </div>
    </header>

    <!-- ===== SIDEBAR ===== -->
    <nav class="sidebar" id="sidebar" role="navigation">
        <div class="nav-section">
            <div class="nav-section-title">📘 Course Parts</div>
            <!-- Will be populated by JS -->
            <div id="navList"></div>
        </div>
        <div
            style="margin-top:1.5rem;padding:0.8rem;background:var(--primary-bg);border-radius:10px;font-size:0.8rem;color:var(--text-light);">
            <strong style="color:var(--primary);">💡 Tip:</strong> Click any topic to jump.
        </div>
    </nav>

    <!-- ===== MAIN ===== -->
    <main class="main-content" id="mainContent">
        <!-- All content rendered by JS -->
        <div id="contentContainer"></div>
    </main>

    <script>

        // ============================================================
        //  SEARCH — LIVE DROPDOWN + HIGHLIGHT (ALL MATCHES)
        // ============================================================
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchResults = document.getElementById('searchResults');

        function performSearch() {
            const query = searchInput.value.trim().toLowerCase();
            // Clear previous highlights and results
            document.querySelectorAll('.highlight').forEach(el => {
                const parent = el.parentNode;
                parent.replaceChild(document.createTextNode(el.textContent), el);
                parent.normalize();
            });
            document.querySelectorAll('.topic-card.search-match').forEach(el => {
                el.classList.remove('search-match');
            });
            searchResults.classList.remove('visible');
            searchResults.innerHTML = '';

            if (!query) return;

            const cards = document.querySelectorAll('.topic-card');
            const matches = [];

            // 1. Find ALL matching topic cards
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                if (text.includes(query)) {
                    const part = card.querySelector('.part-badge')?.textContent || 'Part';
                    const title = card.querySelector('h1')?.textContent || card.id;
                    matches.push({ id: card.id, part, title });
                }
            });

            // 2. Build dropdown list — show ALL matches (no limit)
            if (matches.length === 0) {
                searchResults.innerHTML = `<div class="no-result">❌ No topic found for “${searchInput.value}”</div>`;
                searchResults.classList.add('visible');
                return;
            }

            // Show ALL matches
            matches.forEach(match => {
                const item = document.createElement('div');
                item.className = 'search-result-item';
                item.innerHTML = `
                    <span class="result-part">${match.part}</span>
                    <span class="result-title">${match.title}</span>
                    <span class="result-match">🔍</span>
                `;
                item.addEventListener('click', () => {
                    // Scroll to the selected topic
                    const target = document.getElementById(match.id);
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        // Re-run highlight on that specific card after scrolling
                        setTimeout(() => highlightCard(target, query), 300);
                        searchResults.classList.remove('visible');
                    }
                });
                searchResults.appendChild(item);
            });

            searchResults.classList.add('visible');

            // 3. Highlight matches in ALL cards (first match scrolls)
            let firstMatched = false;
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                if (text.includes(query)) {
                    if (!firstMatched) {
                        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        firstMatched = true;
                    }
                    highlightCard(card, query);
                }
            });
        }

        // Helper: highlight text inside a single card
        function highlightCard(card, query) {
            card.classList.add('search-match');
            const walker = document.createTreeWalker(
                card,
                NodeFilter.SHOW_TEXT,
                {
                    acceptNode: function (node) {
                        const parent = node.parentElement;
                        if (parent && parent.closest('.highlight')) return NodeFilter.FILTER_REJECT;
                        if (node.textContent.toLowerCase().includes(query)) return NodeFilter.FILTER_ACCEPT;
                        return NodeFilter.FILTER_REJECT;
                    }
                }
            );
            const nodes = [];
            let node;
            while (node = walker.nextNode()) {
                nodes.push(node);
            }
            nodes.forEach(textNode => {
                const text = textNode.textContent;
                const parts = text.split(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'));
                const fragment = document.createDocumentFragment();
                parts.forEach(part => {
                    if (part.toLowerCase() === query) {
                        const mark = document.createElement('span');
                        mark.className = 'highlight';
                        mark.textContent = part;
                        fragment.appendChild(mark);
                    } else {
                        fragment.appendChild(document.createTextNode(part));
                    }
                });
                textNode.parentNode.replaceChild(fragment, textNode);
            });
        }

        const navList = document.getElementById('navList');

        function renderNav() {
            navList.innerHTML = '';
            courseData.forEach((item, idx) => {
                const btn = document.createElement('button');
                btn.className = 'nav-item';
                btn.dataset.target = item.id;
                btn.innerHTML = `<span class="num">${String(idx + 1).padStart(2, '0')}</span> ${item.part} : ${item.title}`;
                btn.addEventListener('click', () => {
                    document.getElementById(item.id).scrollIntoView({ behavior: 'smooth' });
                    // close sidebar on mobile
                    document.getElementById('sidebar').classList.remove('open');
                });
                navList.appendChild(btn);
            });
        }

        function renderContent() {
            contentContainer.innerHTML = '';
            courseData.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'topic-card';
                card.id = item.id;
                card.innerHTML = `
                    <div class="part-badge">${item.part}</div>
                    <h1>${item.title}</h1>
                    <div class="subhead">Full course content – Basic to Advanced</div>
                    ${item.content}
                `;
                contentContainer.appendChild(card);
            });
        }

        // ============================================================
        //  MCQ REVEAL
        // ============================================================
        function revealAnswer(btn) {
            const block = btn.closest('.mcq-block');
            const ans = block.querySelector('.answer');
            if (ans) {
                ans.classList.toggle('show');
                btn.textContent = ans.classList.contains('show') ? 'Hide Answer' : 'Show Answer';
            }
        }

        // ============================================================
        //  SIDEBAR TOGGLE (mobile)
        // ============================================================
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });

        // Close sidebar on outside click (mobile)
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('menuToggle');
            if (window.innerWidth <= 820) {
                if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
                    sidebar.classList.remove('open');
                }
            }
        });

        // ============================================================
        //  HIGHLIGHT ACTIVE NAV ON SCROLL
        // ============================================================
        function updateActiveNav() {
            const navItems = document.querySelectorAll('.nav-item');
            const sections = courseData.map(d => document.getElementById(d.id)).filter(Boolean);
            let currentId = null;
            sections.forEach((sec) => {
                const rect = sec.getBoundingClientRect();
                if (rect.top <= 120) {
                    currentId = sec.id;
                }
            });
            navItems.forEach((btn) => {
                btn.classList.toggle('active', btn.dataset.target === currentId);
            });
        }

        window.addEventListener('scroll', updateActiveNav);

        //  INIT
        // ============================================================
        renderNav();
        renderContent();
